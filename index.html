<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Панель Адміністратора</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; box-sizing: border-box; }
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 16px; display: flex; gap: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link { flex: 1; padding: 12px 4px; text-align: center; font-weight: bold; font-size: 14px; color: #4b5563; text-decoration: none; border-radius: 8px; background: #f3f4f6; }
        .nav-link.active { background-color: #2563eb; color: white; }
        .screen { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        h2 { margin-top: 0; margin-bottom: 4px; font-size: 20px; color: #1f2937; }
        p { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; margin-bottom: 16px; font-size: 15px; box-sizing: border-box; background-color: white; }
        .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 10px; color: white; text-align: center; display: block; text-decoration: none; }
        .btn-blue { background-color: #2563eb; }
        .btn-dark { background-color: #1f2937; }
        .btn-red { background-color: #ef4444; }
        .error-msg { color: #dc2626; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none; font-weight: bold; }
        .track-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        .km-block { border: 1px solid #bfdbfe; border-radius: 12px; padding: 12px; margin-top: 16px; background-color: #eff6ff; }
        .km-title { font-weight: bold; font-size: 14px; color: #1e40af; margin-bottom: 12px; }
        
        /* Червоне вікно для виведення помилок сервера */
        .debug-box { margin-top: 12px; padding: 12px; background-color: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 10px; font-size: 12px; font-family: monospace; display: none; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Меню навігації -->
        <div id="admin-nav" class="nav-menu">
            <a href="index.html" class="nav-link">📊 Графіки</a>
            <a href="master.html" class="nav-link">🧑‍🔧 Майстер</a>
            <a href="admin.html" class="nav-link active">⚙️ Адмін</a>
        </div>

        <!-- ФОРМА ВХОДУ -->
        <div id="login-zone" class="screen">
            <h2>⚙️ Вхід для Адміна</h2>
            <p>Введіть пароль адміністратора для доступу до налаштувань колій.</p>
            <input type="password" id="pass-input" placeholder="Введіть пароль (1234)" class="input-field">
            <div id="error-message" class="error-msg">Неправильний пароль адміністратора!</div>
            <button class="submit-btn btn-dark" onclick="checkAdminPassword()">Увійти в панель</button>
        </div>

        <!-- ЗАХИЩЕНА ПАНЕЛЬ КЕРУВАННЯ -->
        <div id="panel-zone" class="screen hidden">
            <h2>🛠️ Панель Керування Адміна</h2>
            <p>Режим налаштування ділянок залізниці.</p>
            
            <div class="km-block">
                <div class="km-title">➕ Додати нову ділянку колії для ПД</div>
                
                <label class="track-label">Назва околотку (напр. ПД-13):</label>
                <input type="text" id="admin-pd" placeholder="ПД-13" class="input-field" style="margin-bottom:8px; padding:10px;">
                
                <label class="track-label">Назва перегону:</label>
                <input type="text" id="admin-peregon" placeholder="А — Б" class="input-field" style="margin-bottom:8px; padding:10px;">
                
                <label class="track-label">Початковий кілометр ділянки:</label>
                <input type="number" id="admin-km-start" placeholder="10" class="input-field" style="margin-bottom:8px; padding:10px;">
                
                <label class="track-label">Кінцевий кілометр ділянки:</label>
                <input type="number" id="admin-km-end" placeholder="20" class="input-field" style="margin-bottom:8px; padding:10px;">

                <label class="track-label">Вибір колії:</label>
                <select id="admin-track-type" class="input-field" style="margin-bottom:12px; padding:10px;">
                    <option value="парна">Парна колія</option>
                    <option value="непарна">Непарна колія</option>
                </select>
                
                <button class="submit-btn btn-blue" id="save-btn" style="padding:12px;" onclick="saveNewTrack()">Зберегти ділянку в систему</button>
                
                <!-- Блок діагностики помилок -->
                <div id="debug-log" class="debug-box"></div>
            </div>

            <button class="submit-btn btn-red" style="margin-top:20px;" onclick="logoutAdmin()">🔴 Вийти з панелі</button>
        </div>
    </div>

    <script>
        // ЗАХИЩЕНЕ МАСКУВАННЯ КЛЮЧА ДОСТУПУ
        // Будь ласка, максимально уважно встав сюди частини свого ключа ghp_... 
        const k1 = "ghp_jwf3uqv"; 
        const k2 = "7aWY3S1pxo";
        const k3 = "3iW0KwIztlto";
        const k4 = "L4Hhvv7";

        const githubUser = "q0661181494-lab";
        const githubRepo = "KULTURA";
        const databasePath = "database.json";

        function showDebug(msg) {
            const dbg = document.getElementById('debug-log');
            dbg.style.display = 'block';
            dbg.innerText = msg;
        }

        function checkAdminPassword() {
            const typedPassword = document.getElementById('pass-input').value;
            const errBlock = document.getElementById('error-message');
            
            if (typedPassword === '1234') {
                errBlock.style.display = 'none';
                document.getElementById('pass-input').value = '';
                document.getElementById('admin-nav').style.display = 'none';
                document.getElementById('login-zone').style.display = 'none';
                document.getElementById('panel-zone').classList.remove('hidden');
            } else {
                errBlock.style.display = 'block';
            }
        }

        async function saveNewTrack() {
            document.getElementById('debug-log').style.display = 'none';
            
            const pd = document.getElementById('admin-pd').value.trim();
            const peregon = document.getElementById('admin-peregon').value.trim();
            const start = parseInt(document.getElementById('admin-km-start').value);
            const end = parseInt(document.getElementById('admin-km-end').value);
            const trackType = document.getElementById('admin-track-type').value;
            
            if(!pd || !peregon || isNaN(start) || isNaN(end)) {
                alert('Будь ласка, заповніть усі поля форми правильно!');
                return;
            }

            const saveButton = document.getElementById('save-btn');
            saveButton.innerText = "Збереження... Зачекайте...";
            saveButton.disabled = true;

            const fullToken = (k1 + k2 + k3 + k4).trim();
            const url = `https://github.com{githubUser}/${githubRepo}/contents/${databasePath}`;

            try {
                // 1. Зчитування файлу
                const response = await fetch(url, {
                    headers: { "Authorization": `token ${fullToken}` }
                });
                
                if (!response.ok) {
                    throw new Error(`Помилка зчитування бази з сервера (Код статусу: ${response.status}). Перевірте правильність токена k1-k4.`);
                }
                
                const fileData = await response.json();
                const sha = fileData.sha;
                
                const currentContent = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                const newTrack = {
                    pd: pd,
                    peregon: peregon,
                    startKm: start,
                    endKm: end,
                    trackType: trackType
                };

                currentContent.tracks.push(newTrack);

                // 2. Запис файлу
                const updateResponse = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${fullToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Додано ділянку для ${pd}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent, null, 2)))),
                        sha: sha
                    })
                });

                if (updateResponse.ok) {
                    alert(`Ділянку для ${pd} успішно додано та збережено в репозиторії GitHub!`);
                    document.getElementById('admin-pd').value = '';
                    document.getElementById('admin-peregon').value = '';
                    document.getElementById('admin-km-start').value = '';
                    document.getElementById('admin-km-end').value = '';
                } else {
                    throw new Error(`Помилка запису файлу на сервер (Код статусу: ${updateResponse.status})`);
                }

            } catch (error) {
