<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контроль обкошування (Виправлено v1.6)</title>
    <style>
        /* Чистий, автономний CSS без сторонніх інтернет-залежностей */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f3f4f6; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; box-sizing: border-box; }
        
        /* Меню навігації */
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 16px; display: flex; gap: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-btn { flex: 1; padding: 12px 4px; text-align: center; border: none; background: #f3f4f6; font-weight: bold; font-size: 14px; color: #4b5563; cursor: pointer; border-radius: 8px; -webkit-tap-highlight-color: transparent; }
        .nav-btn.active { background-color: #2563eb; color: white; }
        
        /* Контейнери екранів */
        .screen { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* Текстові елементи */
        h2 { margin-top: 0; margin-bottom: 4px; font-size: 20px; color: #1f2937; }
        p { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px; }
        
        /* Поля введення */
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; margin-bottom: 16px; font-size: 15px; box-sizing: border-box; background-color: white; }
        .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 10px; color: white; }
        .btn-blue { background-color: #2563eb; }
        .btn-dark { background-color: #1f2937; }
        .btn-red { background-color: #ef4444; }
        .error-msg { color: #dc2626; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none; font-weight: bold; }
        
        /* Лінійна діаграма */
        .km-block { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-top: 16px; background-color: #fafafa; }
        .km-title { font-weight: bold; font-size: 15px; color: #374151; margin-bottom: 8px; text-align: center; }
        .track-row { margin-bottom: 12px; }
        .track-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        
        /* Сетка пікетів (Строго латиницею) */
        .piket-grid { display: flex; gap: 3px; width: 100%; }
        .piket-cell { flex: 1; height: 35px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        
        /* Стан пікетів */
        .cell-red { background-color: #ef4444; }
        .cell-green { background-color: #22c55e; }
        .cell-yellow { background-color: #eab308; color: #1f2937; text-shadow: none; }
        .date-pop { font-size: 7px; font-weight: normal; opacity: 0.9; margin-top: 1px; }

        /* Елементи майстра */
        .pik-clickable { cursor: pointer; transition: 0.1s; }
        .pik-clickable:active { transform: scale(0.9); }
        .pik-clickable.selected { background-color: #16a34a !important; border: 2px solid #1e3a8a; }
    </style>
    
    <script>
        // Скрипт керування (Завантажується першим для надійності)
        const masterPasswords = { '1313': 'ПД-13', '1414': 'ПД-14', '1515': 'ПД-15', '1616': 'ПД-16' };

        function switchTab(tabName) {
            const btnPublic = document.getElementById('btn-public');
            const btnMaster = document.getElementById('btn-master');
            const btnAdmin = document.getElementById('btn-admin');

            const scrPublic = document.getElementById('screen-public');
            const scrMasterLogin = document.getElementById('screen-master-login');
            const scrMasterPanel = document.getElementById('screen-master-panel');
            const scrAdminLogin = document.getElementById('screen-admin-login');
            const scrAdminPanel = document.getElementById('screen-admin-panel');
            const mainNav = document.getElementById('main-nav');

            // Скидаємо всі класи активності
            btnPublic.className = 'nav-btn';
            btnMaster.className = 'nav-btn';
            btnAdmin.className = 'nav-btn';

            // Ховаємо всі вікна
            scrPublic.className = 'screen hidden';
            scrMasterLogin.className = 'screen hidden';
            scrMasterPanel.className = 'screen hidden';
            scrAdminLogin.className = 'screen hidden';
            scrAdminPanel.className = 'screen hidden';
            mainNav.className = 'nav-menu';

            // Відкриваємо потрібну вкладку
            if (tabName === 'public') {
                btnPublic.className = 'nav-btn active';
                scrPublic.className = 'screen';
            } else if (tabName === 'master') {
                btnMaster.className = 'nav-btn active';
                scrMasterLogin.className = 'screen';
                document.getElementById('master-error').style.display = 'none';
            } else if (tabName === 'admin') {
                btnAdmin.className = 'nav-btn active';
                scrAdminLogin.className = 'screen';
                document.getElementById('admin-error').style.display = 'none';
            }
        }

        function loginMaster() {
            const pass = document.getElementById('master-pass').value;
            const error = document.getElementById('master-error');
            if (masterPasswords[pass]) {
                error.style.display = 'none';
                document.getElementById('current-pd-title').innerText = masterPasswords[pass];
                document.getElementById('master-pass').value = '';
                document.getElementById('mow-date').valueAsDate = new Date();
                
                document.getElementById('main-nav').className = 'nav-menu hidden';
                document.getElementById('screen-master-login').className = 'screen hidden';
                document.getElementById('screen-master-panel').className = 'screen';
            } else {
                error.style.display = 'block';
            }
        }

        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            const error = document.getElementById('admin-error');
            if (pass === '1234') {
                error.style.display = 'none';
                document.getElementById('admin-pass').value = '';
                document.getElementById('main-nav').className = 'nav-menu hidden';
                document.getElementById('screen-admin-login').className = 'screen hidden';
                document.getElementById('screen-admin-panel').className = 'screen';
            } else {
                error.style.display = 'block';
            }
        }

        function togglePiketCell(element) {
            if (element.className.indexOf('selected') !== -1) {
                element.className = 'piket-cell cell-red pik-clickable';
            } else {
                element.className = 'piket-cell cell-red pik-clickable selected';
            }
        }
    </script>
</head>
<body>

    <div class="container">
        <!-- Головне меню навігації -->
        <div id="main-nav" class="nav-menu">
            <button id="btn-public" class="nav-btn active" onclick="switchTab('public')">📊 Графіки</button>
            <button id="btn-master" class="nav-btn" onclick="switchTab('master')">🧑‍🔧 Майстер</button>
            <button id="btn-admin" class="nav-btn" onclick="switchTab('admin')">⚙️ Адмін</button>
        </div>

        <!-- Контент додатку -->
        <div>
            <!-- ЕКРАН 1: ГРАФІКИ -->
            <div id="screen-public" class="screen">
                <h2>📊 Лінійна діаграма</h2>
                <p>Оберіть ділянку для перегляду стану обкошування.</p>
                
                <label class="track-label">Околоток:</label>
                <select class="input-field">
                    <option value="">-- Оберіть околоток --</option>
                    <option value="pd13">ПД-13</option>
                    <option value="pd14">ПД-14</option>
                    <option value="pd15">ПД-15</option>
                    <option value="pd16">ПД-16</option>
                </select>

                <label class="track-label">Перегін:</label>
                <select class="input-field">
                    <option value="">-- Оберіть перегін --</option>
                    <option value="1">Перегін А — Б</option>
                </select>

                <div class="km-block">
                    <div class="km-title">125 кілометр</div>
                    <div class="track-row">
                        <span class="track-label">Парна колія:</span>
                        <div class="piket-grid">
                            <div class="piket-cell cell-green">1<span class="date-pop">12.06</span></div>
                            <div class="piket-cell cell-green">2<span class="date-pop">12.06</span></div>
                            <div class="piket-cell cell-green">3<span class="date-pop">12.06</span></div>
                            <div class="piket-cell cell-red">4</div>
                            <div class="piket-cell cell-red">5</div>
                            <div class="piket-cell cell-red">6</div>
                            <div class="piket-cell cell-yellow">7<span class="date-pop">01.05</span></div>
                            <div class="piket-cell cell-red">8</div>
                            <div class="piket-cell cell-red">9</div>
