<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Моніторингу — Кабінет ПД</title>
    <style>
        /* Базові стилі та темна тема */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 180px; /* Місце для монітора */
        }

        /* Навігаційне меню */
        .nav-menu {
            display: flex;
            background: #1e293b;
            padding: 8px;
            border-radius: 12px;
            gap: 8px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .nav-link {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-link.active {
            background: #0284c7;
            color: #ffffff;
        }

        .admin-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Екран та блоки */
        .screen {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .screen.welcome-focus {
            text-align: center;
            padding: 60px 24px;
            border-color: #0d9488;
            animation: pulse-border 3s infinite;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Блок введення ПД */
        .pd-container-box {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .pd-input-row {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 2px solid #475569;
            border-radius: 12px;
            padding: 4px 16px;
            font-size: 24px;
            font-weight: bold;
        }

        .pd-prefix {
            color: #38bdf8;
            user-select: none;
        }

        .input-field.pd-number-box {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            width: 50px;
            outline: none;
            padding: 4px;
        }

        /* Таби та фільтри */
        rose {
            display: block;
            color: #f43f5e;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            background: #334155;
            border: none;
            color: #94a3b8;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: #0d9488;
            color: #ffffff;
        }

        .track-label {
            font-size: 13px;
            color: #94a3b8;
            display: block;
            margin-bottom: 6px;
        }

        .checkbox-group-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 16px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #475569;
        }

        /* Заголовки колій та кілометри */
        .km-signboard {
            background: #334155;
            text-align: center;
            padding: 6px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 6px;
            margin-top: 20px;
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        .track-headers-row {
            display: flex;
            font-size: 11px;
            font-weight: bold;
            color: #94a3b8;
            text-align: center;
            margin: 8px 0;
            text-transform: uppercase;
        }

        .header-margin-space { width: 75px; }
        .header-left-track { flex: 1; text-align: right; padding-right: 15px; }
        .header-center-space { width: 34px; }
        .header-right-track { flex: 1; text-align: left; padding-left: 15px; }

        /* Візуальна рейкова сітка (Рядок Пікета) */
        .piket-rail-node {
            display: flex;
            align-items: center;
            margin: 2px 0;
            height: 38px;
        }

        .station-piket-row {
            background: rgba(2, 132, 199, 0.08);
        }

        .station-boundary-delimiter {
            background: #0284c7;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
            margin: 6px 0;
        }

        /* Зони обкошування */
        .mowing-bank-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: #ffffff;
            box-sizing: border-box;
            text-align: center;
            line-height: 1.1;
        }

        .status-clear-green { background: #15803d; border: 1px solid #22c55e; }
        .status-warn-yellow { background: #a16207; border: 1px solid #eab308; color: #fff; }
        .status-overgrown-red { background: #b91c1c; border: 1px solid #ef4444; }

        /* Графіка колії */
        .rail-line-visual {
            width: 30px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px 0;
            box-sizing: border-box;
            margin: 0 5px;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid #64748b;
            border-right: 2px solid #64748b;
        }

        .rail-line-visual span {
            display: block;
            height: 2px;
            background: #64748b;
            width: 100%;
        }

        .piket-center-core {
            width: 24px;
            height: 24px;
            background: #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }

        /* Бокові поля для світлофорів */
        .info-margin {
            width: 70px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .margin-left { justify-content: flex-end; padding-right: 8px; }
        .margin-right { justify-content: flex-start; padding-left: 8px; }

        .signal-badge {
            background: #312e81;
            color: #a5b4fc;
            border: 1px solid #4338ca;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Система сповіщень (Toast) */
        .signal-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 14px 20px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3);
            font-size: 14px;
            z-index: 9999;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #475569;
            width: calc(100% - 32px);
            max-width: 450px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .signal-toast.show {
            bottom: 16px;
            opacity: 1;
        }

        .signal-toast-accent {
            background: #22c55e;
            color: #1e293b;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        .signal-toast-text {
            font-weight: 500;
            line-height: 1.3;
        }

        /* Монітор Системи (консоль дебагу) */
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            background: #090d16;
            border-top: 2px solid #1e293b;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 12px;
            z-index: 900;
        }

        .debug-title {
            font-weight: bold;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .debug-scroll {
            height: 100px;
            overflow-y: auto;
            color: #94a3b8;
            line-height: 1.4;
        }

        /* Анімації */
        @keyframes blink-cursor {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 rgba(13, 148, 136, 0); }
            50% { box-shadow: 0 0 14px rgba(13, 148, 136, 0.15); border-color: #0d9488; }
        }
    </style>
</head>
<body>
 
    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link active" id="nav-btn-charts">📊 Графіки</a>
            <a href="master.html" class="nav-link" id="nav-btn-master">🧑‍🔧 Кабінет ПД</a>
            <a href="admin.html" class="admin-menu-btn" id="nav-btn-admin">⚙️</a>
        </div>
 
        <div class="screen welcome-focus" id="screen-charts">
            <h2 id="main-screen-title">ВХІД У СИСТЕМУ ДІАГРАМ</h2>
            <p id="main-screen-desc">введіть номер околотка для формування лінійного графіка</p>
            
            <div class="pd-container-box">
                <div class="pd-input-row">
                    <span class="pd-prefix">ПД-</span>
                    <input type="number" id="filter-pd-input" class="input-field pd-number-box" placeholder="|" oninput="handlePdInput()" autofocus>
                </div>
            </div>
 
            <div id="control-tabs-block" style="display: none; margin-top: 16px;">
                <rose>Оберіть режим відображення:</rose>
                <div class="mode-tabs">
                    <button id="tab-pd" class="tab-btn active" onclick="switchDisplayMode('pd')">по ПД</button>
                    <button id="tab-peregon" class="tab-btn" onclick="switchDisplayMode('peregon')">по перегону</button>
                </div>
 
                <div id="peregon-select-container" style="display: none;">
                    <label class="track-label">Оберіть перегін (векторний фільтр):</label>
                    <div id="peregon-checkbox-group" class="checkbox-group-container"></div>
                </div>
            </div>
 
            <div id="diagram-render-zone" class="railway-canvas"></div>
        </div>
    </div>
 
    <div class="debug-panel">
        <div class="debug-title">🖥️ Монітор системи</div>
        <div id="debug-console" class="debug-scroll"></div>
    </div>
 
    <div id="signal-toast" class="signal-toast" onclick="hideSignalToast()">
        <span id="toast-signal-name" class="signal-toast-accent"></span>
        <span id="toast-signal-type" class="signal-toast-text"></span>
    </div>

    <script>
        const fullKey = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        const baseDbUrl = "https://zcyntywoftcahfjwqldr.supabase.co";
 
        let tracksData = []; 
        let mowingData = [];
        let signalsData = [];
        let currentMode = 'pd';
        let toastTimeout;
 
        function logSys(text, status = 'info') {
            const con = document.getElementById('debug-console');
            if(!con) return;
            const div = document.createElement('div');
            if(status === 'success') div.style.color = '#16a34a';
            if(status === 'error') div.style.color = '#dc2626';
            div.innerText = "[" + new Date().toLocaleTimeString() + "]: " + text;
            con.appendChild(div);
            con.scrollTop = con.scrollHeight;
        }
 
        function showSignalToast(element) {
            const name = element.getAttribute('data-name');
            const type = element.getAttribute('data-type');
            
            const toast = document.getElementById('signal-toast');
            document.getElementById('toast-signal-name').innerText = name;
            document.getElementById('toast-signal-type').innerText = type;
            
            toast.classList.add('show');
            
            logSys(`Перегляд сигналу ${name}: ${type}`, 'info');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(hideSignalToast, 4000);
        }

        function hideSignalToast() {
            const toast = document.getElementById('signal-toast');
            if (toast) toast.classList.remove('show');
        }

        async function initApp() {
            logSys("Запуск рейкової платформи...");
            await reloadDataFromCloud();
            document.getElementById('filter-pd-input').focus();
        }
 
        async function reloadDataFromCloud() {
            logSys("Завантаження даних із Supabase...");
            const headers = { 'apikey': fullKey, 'authorization': 'Bearer ' + fullKey };
            try {
                const resTracks = await fetch(`${baseDbUrl}/rest/v1/lines_config?select=*`, { headers });
                tracksData = await resTracks.json();
 
                const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing?select=*`, { headers });
                mowingData = await resMowing.json();
 
                const resSignals = await fetch(`${baseDbUrl}/rest/v1/signals?select=*`, { headers });
                signalsData = await resSignals.json();
 
                logSys(`Синхронізовано з хмарою. Ліній: ${tracksData.length}, Світлофорів: ${signalsData.length}`, 'success');
            } catch (e) {
                logSys("Помилка завантаження: " + e.message, 'error');
            }
        }
 
        function handlePdInput() {
            let inputEl = document.getElementById('filter-pd-input');
            const pdNum = inputEl.value.trim();
            const tabsBlock = document.getElementById('control-tabs-block');
            const container = document.getElementById('diagram-render-zone');
            const screenCard = document.getElementById('screen-charts');
            const mainTitle = document.getElementById('main-screen-title');
            const mainDesc = document.getElementById('main-screen-desc');
 
            if (!pdNum) {
                screenCard.classList.add('welcome-focus');
                tabsBlock.style.display = 'none';
                mainTitle.innerText = "ВХІД У СИСТЕМУ ДІАГРАМ";
                mainDesc.innerText = "введіть номер околотка для формування лінійного графіка";
                container.innerHTML = "";
                return;
            }
 
            if (pdNum.length > 2) {
                inputEl.value = pdNum.slice(0, 2);
            }
 
            screenCard.classList.remove('welcome-focus');
            tabsBlock.style.display = 'block';
            mainTitle.innerText = "ДВОКОЛІЙНА ДІАГРАМА";
            mainDesc.innerText = "Стан обкошування брівок парної та непарної колій";
 
            const fullPdName = "ПД-" + inputEl.value.trim();
            const filtered = tracksData.filter(t => t.pd === fullPdName && !t.track_type.includes('станція'));
            const uniquePeregons = [...new Set(filtered.map(t => t.name))].sort();
            
            const checkboxGroup = document.getElementById('peregon-checkbox-group');
            checkboxGroup.innerHTML = "";
 
            if (uniquePeregons.length === 0) {
                checkboxGroup.innerHTML = "<p style='color:gray; font-size:12px; margin:0;'>Немає перегонів у цього ПД</p>";
            } else {
                uniquePeregons.forEach((p, index) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.value = p;
                    if (index === 0) chk.checked = true; 
                    chk.onchange = drawDoubleTrackDiagram;
 
                    label.appendChild(chk);
                    label.appendChild(document.createTextNode(p));
                    checkboxGroup.appendChild(label);
                });
            }
 
            drawDoubleTrackDiagram();
 
            if (inputEl.value.trim().length === 2) {
                document.activeElement.blur(); 
                logSys("Клавіатуру згорнуто автоматично.");
            }
        }
 
        function switchDisplayMode(mode) {
            currentMode = mode;
            document.getElementById('tab-pd').classList.toggle('active', mode === 'pd');
            document.getElementById('tab-peregon').classList.toggle('active', mode === 'peregon');
            document.getElementById('peregon-select-container').style.display = (mode === 'peregon') ? 'block' : 'none';
             
            drawDoubleTrackDiagram();
        }
 
        function getPiketAnalysis(peregonName, trackType, km, pk) {
            if (!mowingData || mowingData.length === 0) {
                return { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
            }
 
            const cloudRecord = mowingData.find(m => 
                m.object_name === peregonName && m.track_type === trackType &&
                parseInt(m.km) === km && parseInt(m.piket) === pk
            );
 
            if (!cloudRecord || cloudRecord.status !== 'green') {
                return { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
            }
            if (!cloudRecord.date) {
                return { colorClass: 'status-clear-green', label: 'Обкошено', days: '0 дн.' };
            }
 
            const mowedDate = new Date(cloudRecord.date);
            const today = new Date();
            const diffDays = Math.ceil(Math.abs(today - mowedDate) / (1000 * 60 * 60 * 24));
 
            if (diffDays >= 45) return { colorClass: 'status-overgrown-red', label: 'Критично', days: `${diffDays} дн.` };
            if (diffDays >= 30) return { colorClass: 'status-warn-yellow', label: 'Увага', days: `${diffDays} дн.` };
            return { colorClass: 'status-clear-green', label: 'Обкошено', days: `${diffDays} дн.` };
        }
 
        function drawDoubleTrackDiagram() {
            const pdNum = document.getElementById('filter-pd-input').value.trim();
            const container = document.getElementById('diagram-render-zone');
            if (!pdNum) return;
 
            const fullPdName = "ПД-" + pdNum;
            container.innerHTML = "";
            
            let segmentsToRender = [];
            let minKm, maxKm;
 
            if (currentMode === 'pd') {
                segmentsToRender = tracksData.filter(t => t.pd === fullPdName);
                if (segmentsToRender.length === 0) {
                    container.innerHTML = "<p style='color:red; text-align:center;'>Конфігурацію ділянок не знайдено.</p>";
                    return;
                }
                minKm = Math.min(...segmentsToRender.map(s => parseInt(s.start_km)));
                maxKm = Math.max(...segmentsToRender.map(s => parseInt(s.end_km)));
            } else {
                const checkedBoxes = document.querySelectorAll('#peregon-checkbox-group input[type="checkbox"]:checked');
                const selectedPeregons = Array.from(checkedBoxes).map(cb => cb.value);
 
                if (selectedPeregons.length === 0) {
                    container.innerHTML = "<p style='color:gray; text-align:center; padding:10px;'>Оберіть хоча б один перегін.</p>";
                    return;
                }
 
                const purePeregons = tracksData.filter(t => selectedPeregons.includes(t.name) && t.pd === fullPdName);
                if (purePeregons.length === 0) {
                    container.innerHTML = "<p style='color:red; text-align:center;'>Конфігурацію перегону не знайдено.</p>";
                    return;
                }
 
                minKm = Math.min(...purePeregons.map(s => parseInt(s.start_km)));
                maxKm = Math.max(...purePeregons.map(s => parseInt(s.end_km)));
 
                segmentsToRender = [...purePeregons];
 
                selectedPeregons.forEach(pName => {
                    const stationTokens = pName.split('-').map(s => s.trim().toLowerCase());
                    tracksData.forEach(t => {
                        if (t.type && t.type.includes('станція')) {
                            const isDotichna = stationTokens.some(token => t.name.toLowerCase().includes(token));
                            if (isDotichna) {
                                const sStart = parseInt(t.start_km);
                                const sEnd = parseInt(t.end_km);
                                const hasOverlap = (sStart <= maxKm && sEnd >= minKm);
 
                                if (hasOverlap && !segmentsToRender.some(added => added.id === t.id)) {
                                    segmentsToRender.push(t);
                                }
                            }
                        }
                    });
                });
            }
 
            for (let km = minKm; km <= maxKm; km++) {
                
                const kmSign = document.createElement('div');
                kmSign.className = 'km-signboard';
                kmSign.innerText = `Кілометр ${km}`;
                container.appendChild(kmSign);
 
                const headersRow = document.createElement('div');
                headersRow.className = 'track-headers-row';
                headersRow.innerHTML = `
                    <div class="header-margin-space"></div>
                    <div class="header-left-track">ПАРНА</div>
                    <div class="header-center-space"></div>
                    <div class="header-right-track">НЕПАРНА</div>
                    <div class="header-margin-space"></div>
                `;
                container.appendChild(headersRow);
 
                for (let pk = 1; pk <= 10; pk++) {
                    const leftConfig = segmentsToRender.find(s => km >= parseInt(s.start_km) && km <= parseInt(s.end_km) && s.track_type && s.track_type.includes('парна')); 
                    const rightConfig = segmentsToRender.find(s => km >= parseInt(s.start_km) && km <= parseInt(s.end_km) && s.track_type && s.track_type.includes('непарна'));
                    const stationConfig = segmentsToRender.find(s => km >= parseInt(s.start_km) && km <= parseInt(s.end_km) && s.type && s.type.includes('станція'));
 
                    const finalLeftConfig = stationConfig || leftConfig;
                    const finalRightConfig = stationConfig || rightConfig;
 
                    const leftSide = finalLeftConfig ? getPiketAnalysis(finalLeftConfig.name, finalLeftConfig.track_type, km, pk) : { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
                    const rightSide = finalRightConfig ? getPiketAnalysis(finalRightConfig.name, finalRightConfig.track_type, km, pk) : { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
 
                    const nodeRow = document.createElement('div');
                    nodeRow.className = 'piket-rail-node';
                    
                    let isLastPiketOfStation = false;
 
                    if (stationConfig) {
                        const sKm = parseInt(stationConfig.start_km);
                        const sPk = parseInt(stationConfig.start_pk);
                        const eKm = parseInt(stationConfig.end_km);
                        const ePk = parseInt(stationConfig.end_pk);
 
                        const currentAbs = km * 10 + pk;
                        const startAbs = sKm * 10 + sPk;
                        const endAbs = eKm * 10 + ePk;
 
                        if (currentAbs >= startAbs && currentAbs <= endAbs) {
                            if (currentAbs === startAbs) {
                                const delimiterStart = document.createElement('div');
                                delimiterStart.className = 'station-boundary-delimiter';
                                delimiterStart.innerText = `🚉 Станція ${stationConfig.name}`;
                                container.appendChild(delimiterStart);
                            }
                            
                            nodeRow.classList.add('station-piket-row');
 
                            if (currentAbs === endAbs) {
                                isLastPiketOfStation = true;
                            }
                        }
                    }
 
                    const leftSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && s.track_type.toLowerCase().trim() === 'парна' && s.pd === fullPdName);
                    const rightSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && s.track_type.toLowerCase().trim() === 'непарна' && s.pd === fullPdName);
 
                    const leftMargin = document.createElement('div');
                    leftMargin.className = 'info-margin margin-left';
                    if (leftSignal) {
                        const signalNote = leftSignal.signal_type || leftSignal.signal || 'Примітка відсутня';
                        leftMargin.innerHTML = `
                            <span class="signal-badge" 
                                  style="cursor: pointer;" 
                                  data-name="${leftSignal.signal_name}" 
                                  data-type="${signalNote}" 
                                  onclick="showSignalToast(this)">
                                ${leftSignal.signal_name}
                            </span>`;
                    }
                    nodeRow.appendChild(leftMargin);
 
                    const leftBank = document.createElement('div');
                    leftBank.className = `mowing-bank-zone ${leftSide.colorClass}`;
                    leftBank.innerHTML = `<div>${leftSide.label}</div><div style="font-size:9px; opacity:0.85;">${leftSide.days}</div>`;
                    nodeRow.appendChild(leftBank);
 
                    const leftTrackVisual = document.createElement('div');
                    leftTrackVisual.className = 'rail-line-visual';
                    leftTrackVisual.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(leftTrackVisual);
 
                    const centerPiket = document.createElement('div');
                    centerPiket.className = 'piket-center-core';
                    centerPiket.innerText = pk;
                    nodeRow.appendChild(centerPiket);
 
                    const rightTrackVisual = document.createElement('div');
                    rightTrackVisual.className = 'rail-line-visual';
                    rightTrackVisual.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(rightTrackVisual);
 
                    const rightBank = document.createElement('div');
                    rightBank.className = `mowing-bank-zone ${rightSide.colorClass}`;
                    rightBank.innerHTML = `<div>${rightSide.label}</div><div style="font-size:9px; opacity:0.85;">${rightSide.days}</div>`;
                    nodeRow.appendChild(rightBank);
                    
                    const rightMargin = document.createElement('div');
                    rightMargin.className = 'info-margin margin-right';
                    if (rightSignal) {
                        const signalNote = rightSignal.signal_type || rightSignal.signal || 'Примітка відсутня';
                        rightMargin.innerHTML = `
                            <span class="signal-badge" 
                                  style="cursor: pointer;" 
                                  data-name="${rightSignal.signal_name}" 
                                  data-type="${signalNote}" 
                                  onclick="showSignalToast(this)">
                                ${rightSignal.signal_name}
                            </span>`;
                    }
                    nodeRow.appendChild(rightMargin);
 
                    container.appendChild(nodeRow);
 
                    if (isLastPiketOfStation && stationConfig) {
                        const delimiterEnd = document.createElement('div');
                        delimiterEnd.className = 'station-boundary-delimiter';
                        delimiterEnd.innerText = `🚉 Станція ${stationConfig.name}`;
                        container.appendChild(delimiterEnd);
                    }
                }
            }
            logSys(`Діаграму оновлено успішно.`, 'info');
        }
 
        window.onload = initApp;
    </script>
</body>
</html>
