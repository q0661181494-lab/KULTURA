<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Лінійна діаграма</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; box-sizing: border-box; }
        
        /* Навігація через прямі інтернет-посилання */
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 16px; display: flex; gap: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link { flex: 1; padding: 12px 4px; text-align: center; font-weight: bold; font-size: 14px; color: #4b5563; text-decoration: none; border-radius: 8px; background: #f3f4f6; }
        .nav-link.active { background-color: #2563eb; color: white; }
        
        .screen { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; margin-bottom: 4px; font-size: 20px; color: #1f2937; }
        p { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px; }
        
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; margin-bottom: 16px; font-size: 15px; box-sizing: border-box; background-color: white; }
        .track-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        
        /* Діаграма колії */
        .km-block { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-top: 16px; background-color: #fafafa; }
        .km-title { font-weight: bold; font-size: 15px; color: #374151; margin-bottom: 8px; text-align: center; }
        .track-row { margin-bottom: 12px; }
        .piket-grid { display: flex; gap: 3px; width: 100%; }
        .piket-cell { flex: 1; height: 35px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        
        .cell-red { background-color: #ef4444; }
        .cell-green { background-color: #22c55e; }
        .cell-yellow { background-color: #eab308; color: #1f2937; text-shadow: none; }
        .date-pop { font-size: 7px; font-weight: normal; opacity: 0.9; margin-top: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Головне меню: Прямі переходи на окремі файли сторінок -->
        <div class="nav-menu">
            <a href="index.html" class="nav-link active">📊 Графіки</a>
            <a href="master.html" class="nav-link">🧑‍🔧 Майстер</a>
            <a href="admin.html" class="nav-link">⚙️ Адмін</a>
        </div>

        <!-- Головний екран діаграм -->
        <div class="screen">
            <h2>📊 Лінійна діаграма</h2>
            <p>Оберіть ділянку для перегляду стану обкошування.</p>
            
            <label class="track-label">Околоток:</label>
            <select class="input-field">
                <option value="">-- Оберіть околоток --</option>
                <option value="pd13">ПД-13</option>
                <option value="pd14">ПД-14</option>
                <option value="pd15">ПД-15</option>
                <option value="pd16">ПД-16</option>
            </select>

            <label class="track-label">Перегін:</label>
            <select class="input-field">
                <option value="">-- Оберіть перегін --</option>
                <option value="1">Перегін А — Б</option>
            </select>

            <div class="km-block">
                <div class="km-title">125 кілометр</div>
                <div class="track-row">
                    <span class="track-label">Парна колія:</span>
                    <div class="piket-grid">
                        <div class="piket-cell cell-green">1<span class="date-pop">12.06</span></div>
                        <div class="piket-cell cell-green">2<span class="date-pop">12.06</span></div>
                        <div class="piket-cell cell-green">3<span class="date-pop">12.06</span></div>
                        <div class="piket-cell cell-red">4</div>
                        <div class="piket-cell cell-red">5</div>
                        <div class="piket-cell cell-red">6</div>
                        <div class="piket-cell cell-yellow">7<span class="date-pop">01.05</span></div>
                        <div class="piket-cell cell-red">8</div>
                        <div class="piket-cell cell-red">9</div>
                        <div class="piket-cell cell-red">10</div>
                    </div>
                </div>
                <div class="track-row">
                    <span class="track-label">Непарна колія:</span>
                    <div class="piket-grid">
                        <div class="piket-cell cell-red">1</div>
                        <div class="piket-cell cell-red">2</div>
                        <div class="piket-cell cell-green">3<span class="date-pop">15.06</span></div>
                        <div class="piket-cell cell-green">4<span class="date-pop">15.06</span></div>
                        <div class="piket-cell cell-red">5</div>
                        <div class="piket-cell cell-red">6</div>
                        <div class="piket-cell cell-red">7</div>
                        <div class="piket-cell cell-red">8</div>
                        <div class="piket-cell cell-red">9</div>
                        <div class="piket-cell cell-red">10</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
