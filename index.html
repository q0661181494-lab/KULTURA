<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Лінійна діаграма</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; box-sizing: border-box; }
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 16px; display: flex; gap: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link { flex: 1; padding: 12px 4px; text-align: center; font-weight: bold; font-size: 14px; color: #4b5563; text-decoration: none; border-radius: 8px; background: #f3f4f6; }
        .nav-link.active { background-color: #2563eb; color: white; }
        .screen { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; margin-bottom: 4px; font-size: 20px; color: #1f2937; }
        p { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; margin-bottom: 16px; font-size: 15px; box-sizing: border-box; background-color: white; }
        .track-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        .km-block { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-top: 16px; background-color: #fafafa; }
        .km-title { font-weight: bold; font-size: 15px; color: #374151; margin-bottom: 8px; text-align: center; }
        .track-row { margin-bottom: 12px; }
        .track-row:last-child { margin-bottom: 0; }
        .piket-grid { display: flex; gap: 3px; width: 100%; }
        .piket-cell { flex: 1; height: 35px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; text-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .cell-red { background-color: #ef4444; }
        .cell-green { background-color: #22c55e; }
        .cell-yellow { background-color: #eab308; color: #1f2937; text-shadow: none; }
        .date-pop { font-size: 7px; font-weight: normal; opacity: 0.9; margin-top: 1px; }
        .status-msg { text-align: center; color: #6b7280; font-size: 14px; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link active">📊 Графіки</a>
            <a href="master.html" class="nav-link">🧑‍🔧 Майстер</a>
            <a href="admin.html" class="nav-link">⚙️ Адмін</a>
        </div>

        <div class="screen">
            <h2>📊 Лінійна діаграма</h2>
            <p>Оберіть ділянку для перегляду стану робіт.</p>
            
            <label class="track-label">Околоток:</label>
            <select id="select-pd" class="input-field" onchange="updatePeregonList()">
                <option value="">-- Завантаження даних... --</option>
            </select>

            <label class="track-label">Перегін:</label>
            <select id="select-peregon" class="input-field" onchange="renderLinearDiagram()">
                <option value="">-- Спочатку оберіть околоток --</option>
            </select>

            <div id="diagram-container">
                <div class="status-msg">Будь ласка, оберіть околоток та перегін.</div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://supabase.co";
        const supabaseKey = "sb_publishable_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjeW50eXdvZnRjYWhmdndxbGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MTYwMjIsImV4cCI6MjA4NTAxNjAyMn0._6_6_f0MY82M4MPhakQ9adUQ_BWhwmR10";

        let dbTracks = [];
        let dbMowing = [];

        window.onload = async function() {
            try {
                const resTracks = await fetch(`${supabaseUrl}/rest/v1/tracks`, { headers: { 'apikey': supabaseKey } });
                const resMowing = await fetch(`${supabaseUrl}/rest/v1/mowing`, { headers: { 'apikey': supabaseKey } });

                if (!resTracks.ok) throw new Error("Помилка сервера");

                dbTracks = await resTracks.json();
                dbMowing = await resMowing.json();

                initPdDropdown();
            } catch (error) {
                document.getElementById('diagram-container').innerHTML = `<div class="status-msg" style="color:#dc2626;">🚨 Помилка підключення</div>`;
            }
        };

        function initPdDropdown() {
            const pdSelect = document.getElementById('select-pd');
            pdSelect.innerHTML = '<option value="">-- Оберіть околоток --</option>';
            const uniquePds = [...new Set(dbTracks.map(t => t.pd))];
            
            if(uniquePds.length === 0) {
                pdSelect.innerHTML = '<option value="">База порожня</option>';
                return;
            }
            uniquePds.forEach(pd => {
                const opt = document.createElement('option');
                opt.value = pd; opt.innerText = pd; pdSelect.appendChild(opt);
            });
        }

        function updatePeregonList() {
            const selectedPd = document.getElementById('select-pd').value;
            const peregonSelect = document.getElementById('select-peregon');
            peregonSelect.innerHTML = '<option value="">-- Оберіть перегін --</option>';
            
            if (!selectedPd) return;
            const filtered = dbTracks.filter(t => t.pd === selectedPd);
            const uniquePeregons = [...new Set(filtered.map(t => t.peregon))];

            uniquePeregons.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = `Перегін ${p}`; peregonSelect.appendChild(opt);
            });
        }

        function renderLinearDiagram() {
            const selectedPd = document.getElementById('select-pd').value;
            const selectedPeregon = document.getElementById('select-peregon').value;
            const container = document.getElementById('diagram-container');
            container.innerHTML = '';

            if (!selectedPd || !selectedPeregon) return;
            const activeTracks = dbTracks.filter(t => t.pd === selectedPd && t.peregon === selectedPeregon);

            let minKm = Infinity; let maxKm = -Infinity;
            activeTracks.forEach(t => {
                if(t.start_km < minKm) minKm = t.start_km;
                if(t.end_km > maxKm) maxKm = t.end_km;
            });

            for (let km = minKm; km <= maxKm; km++) {
                const hasUpTrack = activeTracks.some(t => t.track_type === 'парна' && km >= t.start_km && km <= t.end_km);
                const hasDownTrack = activeTracks.some(t => t.track_type === 'непарна' && km >= t.start_km && km <= t.end_km);

                if (!hasUpTrack && !hasDownTrack) continue;

                const kmBlock = document.createElement('div');
                kmBlock.className = 'km-block';
                const kmTitle = document.createElement('div');
                kmTitle.className = 'km-title'; kmTitle.innerText = `${km} кілометр`;
                kmBlock.appendChild(kmTitle);

                if (hasUpTrack) kmBlock.appendChild(createTrackRow("Парна колія:", km, "парна", selectedPeregon));
                if (hasDownTrack) kmBlock.appendChild(createTrackRow("Непарна колія:", km, "непарна", selectedPeregon));
                container.appendChild(kmBlock);
            }
        }

        function createTrackRow(labelText, km, trackType, peregon) {
            const row = document.createElement('div');
            row.className = 'track-row';
            const label = document.createElement('span');
            label.className = 'track-label'; label.innerText = labelText;
            row.appendChild(label);
            
            const grid = document.createElement('div');
            grid.className = 'piket-grid';
            const cellMows = dbMowing.filter(m => m.peregon === peregon && m.track_type === trackType && m.km === km);

            for (let p = 1; p <= 10; p++) {
                const cell = document.createElement('div');
                cell.innerText = p;
                let latestMow = null;
                cellMows.forEach(m => {
                    if (m.pikets.includes(p)) {
                        if (!latestMow || new Date(m.mow_date) > new Date(latestMow.mow_date)) latestMow = m;
                    }
                });

                if (!latestMow) {
                    cell.className = 'piket-cell cell-red';
                } else {
                    const mowDate = new Date(latestMow.mow_date);
                    const today = new Date();
                    const diffDays = Math.ceil(Math.abs(today - mowDate) / (1000 * 60 * 60 * 24));
                    const d = mowDate.getDate().toString().padStart(2, '0');
                    const m = (mowDate.getMonth() + 1).toString().padStart(2, '0');

                    cell.className = diffDays > 45 ? 'piket-cell cell-yellow' : 'piket-cell cell-green';
                    cell.innerHTML = `${p}<span class="date-pop">${d}.${m}</span>`;
                }
                grid.appendChild(cell);
            }
            row.appendChild(grid);
            return row;
        }
    </script>
</body>
</html>
