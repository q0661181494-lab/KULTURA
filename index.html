<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Двоколійна залізнична діаграма (Матча)</title>
    <style>
        /* Фіксація скролбару та розтягування на весь екран */
        html, body {
            height: 100%;
            overflow-y: scroll;
        }
 
        /* Фірмове легке фісташкове тло */
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #f0fdf4; 
            margin: 0;
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between; 
            box-sizing: border-box;
            position: relative;
        }
 
        .container { 
            width: 100%; 
            max-width: 580px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column;
            flex-grow: 1; 
        }
        
        /* Навігаційне меню у шавлієвих тонах */
        .nav-menu { 
            background: white; 
            border-radius: 12px; 
            padding: 6px; 
            margin-bottom: 12px; 
            display: flex; 
            gap: 6px; 
            box-shadow: 0 4px 10px rgba(11, 94, 89, 0.06); 
            width: 100%; 
            box-sizing: border-box; 
            align-items: center; 
            border: 1px solid #d1fae5; 
        }
        
        .nav-link { 
            flex: 1; 
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center; 
            font-weight: bold; 
            font-size: 14px; 
            color: #115e59; 
            text-decoration: none; 
            border-radius: 8px; 
            background: #f0fdf4; 
            cursor: pointer; 
            box-sizing: border-box;
            border: none;
        }
        
        .admin-menu-btn { 
            width: 42px; 
            height: 42px; 
            background-color: #f0fdf4; 
            color: #115e59; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            border: none; 
            flex-shrink: 0; 
            text-decoration: none; 
            cursor: pointer;
            box-sizing: border-box;
        }
 
        .nav-link:hover, .admin-menu-btn:hover {
            background-color: #e6f4ea;
        }
        
        .nav-link.active, .admin-menu-btn.active { 
            background-color: #115e59 !important; 
            color: white !important; 
            pointer-events: none;
        }
        
        /* Головна картка з м'якою шавлієвою рамкою */
        .screen { 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(11, 94, 89, 0.05); 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 24px; 
            border: 1px solid #d1fae5;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s, border-color 0.3s;
        }
 
        /* Фіксоване верхнє положення блоку без стрибків вгору-вниз */
        .screen.welcome-focus {
            margin-top: 10px;
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(11, 94, 89, 0.12);
            border-color: #a7f3d0;
            padding: 30px 20px;
        }
 
        /* СОЛІДНИЙ ЗАГОЛОВОК ЗАГЛАВНИМИ ЛІТЕРАМИ */
        h2 { 
            margin-top: 0; 
            margin-bottom: 6px; 
            font-size: 18px; 
            color: #115e59; 
            font-weight: 800; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1.8px; 
        }
        p { color: #0f766e; font-size: 13px; margin-top: 0; margin-bottom: 16px; text-align: center; opacity: 0.8; }
        
        /* Поля введення */
        .input-field { width: 100%; padding: 11px; border: 1px solid #a7f3d0; border-radius: 10px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; background-color: white; color: #115e59; font-weight: 500; transition: all 0.2s; }
        .input-field:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2); }
        .track-label { font-size: 11px; font-weight: 700; color: #115e59; margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
 
        /* КРЕАТИВНИЙ БЛОК ВВЕДЕННЯ ПД */
        .pd-container-box {
            transition: all 0.3s ease;
        }
        
        .welcome-focus .pd-container-box {
            background: #f0fdf4;
            padding: 24px;
            border-radius: 14px;
            border: 1px dashed #0d9488;
            margin-top: 10px;
            animation: pulse-border 2.5s infinite ease-in-out; 
        }
        
        /* Строге центрування поля введення */
        .pd-input-row { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            width: 180px;
            margin: 0 auto;
        }
        .pd-prefix { 
            font-size: 24px; 
            font-weight: 900; 
            color: #115e59; 
            letter-spacing: 1px; 
            position: absolute;
            left: 0;
        }
        
        /* Поле вводу */
        .pd-number-box { 
            width: 100px !important; 
            height: 54px;
            font-size: 24px !important; 
            margin-bottom: 0 !important; 
            text-align: center; 
            font-weight: 900;
            border-radius: 12px;
            border: 2px solid #a7f3d0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-left: auto;
            margin-right: 0;
        }
 
        /* Анімація пульсуючого кастомного плейсхолдера */
        .pd-number-box::placeholder {
            color: #0d9488;
            opacity: 0.6;
            font-weight: 300;
            animation: blink-cursor 1.2s infinite steps(2);
        }
 
        /* Стильні Кнопки-Таби */
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 12px; background: #f0fdf4; padding: 4px; border-radius: 10px; border: 1px solid #c2e7d9; }
        .tab-btn { flex: 1; padding: 9px; border: none; background: transparent; border-radius: 7px; color: #115e59; font-weight: bold; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .tab-btn.active { background: #0d9488; color: white; }
        
        /* Контейнер для списку чекбоксів перегонів */
        .checkbox-group-container { display: flex; flex-direction: column; gap: 6px; background: #fff; border: 1px solid #a7f3d0; border-radius: 10px; padding: 10px; max-height: 150px; overflow-y: auto; margin-bottom: 12px; box-sizing: border-box; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #115e59; font-weight: 500; cursor: pointer; padding: 4px 0; }
        .checkbox-item input { width: 16px; height: 16px; accent-color: #0d9488; cursor: pointer; }
 
        /* ДВОКОЛІЙНА ВЕРТИКАЛЬНА ПЛАТФОРМА */
        .railway-canvas { display: flex; flex-direction: column; width: 100%; margin-top: 8px; }
        
        /* Залізничний знак кілометра */
        .km-signboard { background: #e6f4ea; border: 2px solid #115e59; border-radius: 8px; padding: 8px; margin: 18px 0 8px 0; text-align: center; font-weight: 900; font-size: 14px; color: #115e59; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 2px 5px rgba(17,94,89,0.05); }
        .km-signboard:first-child { margin-top: 0; }
        
        /* Заголовки стовпчиків колій */
        .track-headers-row { display: flex; width: 100%; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #0f766e; text-transform: uppercase; text-align: center; opacity: 0.8; }
        .header-margin-space { width: 50px; }
        .header-left-track { flex: 1; padding-right: 16px; }
        .header-center-space { width: 42px; }
        .header-right-track { flex: 1; padding-left: 16px; }
 
        /* Рядок пікета */
        .piket-rail-node { display: flex; align-items: center; margin-bottom: 5px; height: 44px; position: relative; border-radius: 6px; transition: background-color 0.2s; }
 
        /* Перенесені стилі станційних меж з кабінету ПД */
        .station-bracket-left { background-color: rgba(37, 99, 235, 0.08) !important; border-left: 4px solid var(--station-color) !important; border-radius: 6px 0 0 6px; }
        .station-bracket-right { background-color: rgba(37, 99, 235, 0.08) !important; border-right: 4px solid var(--station-color) !important; border-radius: 0 6px 6px 0; }
        :root { --station-color: #2563eb; }
        
        /* Бокові поля для світлофорів */
        .info-margin { width: 50px; height: 100%; display: flex; align-items: center; font-size: 10px; font-weight: bold; color: #0f766e; box-sizing: border-box; }
        .margin-left { justify-content: flex-end; padding-right: 4px; }
        .margin-right { justify-content: flex-start; padding-left: 4px; }
 
        /* МОДЕРНІЗОВАНІ СИГНАЛЬНІ ПЛАШКИ (СВІТЛОФОРИ) */
        .signal-badge { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            background: #1e293b; 
            color: #ffffff; 
            padding: 4px 8px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 800; 
            letter-spacing: 0.3px; 
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            border: 1px solid #475569;
            min-width: 42px; 
            max-width: 46px;
            box-sizing: border-box;
            white-space: nowrap; 
        }
        .signal-badge::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            margin-right: 4px;
            box-shadow: 0 0 6px #22c55e;
            flex-shrink: 0;
        }
 
        /* Зони обкошування */
        .mowing-bank-zone { flex: 1; height: 100%; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.04); padding: 0 4px; text-align: center; line-height: 1.2; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); background-color: #fff; }
        .piket-center-core { width: 42px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #115e59; background: #e6f4ea; border-radius: 5px; margin: 0 6px; z-index: 2; border: 1px solid #a7f3d0; box-sizing: border-box; }
        
        /* Напівпрозорий колір для відображення робіт суміжного ПД */
        .inactive-bank { opacity: 0.50 !important; filter: grayscale(15%); }

        /* Рейкова нитка */
        .rail-line-visual { width: 12px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: #cbd5e1; }
        .rail-line-visual::before, .rail-line-visual::after { content: ""; position: absolute; top: 0; width: 2px; height: 100%; background: #475569; }
        .rail-line-visual::before { left: 1px; }
        .rail-line-visual::after { right: 1px; }
        .rail-line-visual span { display: block; width: 100%; height: 3px; background: #64748b; margin: 2px 0; }
 
        /* Колірна палітра */
        .status-clear-green { background-color: #22c55e !important; color: white !important; }
        .status-warn-yellow { background-color: #eab308 !important; color: #1f2937 !important; }
        .status-overgrown-red { background-color: #ef4444 !important; color: white !important; }
        .status-unknown { background-color: #f1f5f9 !important; color: #64748b !important; border: 1px dashed #cbd5e1 !important; }
        
        /* ПЕРЕНЕСЕНО: Прихований монітор системи з викликом знизу ліворуч */
        .debug-panel {
            flex-shrink: 0;
            width: 100%;
            max-width: 580px;
            position: fixed;
            bottom: -210px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 10px;
            background-color: rgba(230, 244, 234, 0.98);
            backdrop-filter: blur(6px);
            border: 1px solid #c2e7d9;
            color: #115e59;
            border-radius: 12px 12px 0 0;
            font-size: 11px;
            font-family: monospace;
            box-shadow: 0 -4px 20px rgba(11,94,89,0.15);
            box-sizing: border-box;
            transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .debug-panel.active { bottom: 0px; }
        @media (max-width: 600px) { .debug-panel { width: calc(100% - 20px); } }
        .debug-title { font-weight: bold; color: #0f766e; margin-bottom: 4px; border-bottom: 1px solid #c2e7d9; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .debug-scroll { max-height: 60px; overflow-y: auto; text-align: left; }
        
        /* Напівпрозора кнопка виклику монітора */
        .debug-toggle-btn {
            position: fixed;
            bottom: 4px;
            left: 4px;
            width: 26px;
            height: 26px;
            background: rgba(148, 163, 184, 0.12);
            color: #475569;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.6;
        }
        .debug-toggle-btn:hover { background: rgba(148, 163, 184, 0.35); opacity: 1; }
 
        /* Елегантний мобільний Toast-інформер для світлофорів */
        .signal-toast {
            position: fixed;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 14px 20px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3);
            font-size: 14px;
            z-index: 9999;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #475569;
            width: calc(100% - 32px);
            max-width: 450px;
            box-sizing: border-box;
            cursor: pointer;
        }
        .signal-toast.show { bottom: 16px; opacity: 1; }
        .signal-toast-accent { background: #22c55e; color: #1e293b; font-weight: 900; padding: 3px 8px; border-radius: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
        .signal-toast-text { font-weight: 500; line-height: 1.3; }
 
        @keyframes blink-cursor { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(13, 148, 136, 0); } 50% { box-shadow: 0 0 14px rgba(13, 148, 136, 0.15); border-color: #0d9488; } }
    </style>
</head>
<body>
 
    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link active" id="nav-btn-charts">📊 Графіки</a>
            <a href="master.html" class="nav-link" id="nav-btn-master">🚪 Кабінет ПД</a>
            <a href="admin.html" class="admin-menu-btn" id="nav-btn-admin">⚙️</a>
        </div>
 
        <div class="screen welcome-focus" id="screen-charts">
            <h2 id="main-screen-title">ВХІД У СИСТЕМУ ДІАГРАМ</h2>
            <p id="main-screen-desc">введіть номер околотка для формування лінівного графіка</p>
            
            <div class="pd-container-box">
                <div class="pd-input-row">
                    <span class="pd-prefix">ПД-</span>
                    <input type="number" id="filter-pd-input" class="input-field pd-number-box" placeholder="|" oninput="handlePdInput()" autofocus>
                </div>
            </div>
 
            <div id="control-tabs-block" style="display: none; margin-top: 16px;">
                <rose>Оберіть режим відображення:</rose>
                <div class="mode-tabs">
                    <button id="tab-pd" class="tab-btn active" onclick="switchDisplayMode('pd')">по ПД</button>
                    <button id="tab-peregon" class="tab-btn" onclick="switchDisplayMode('peregon')">по перегону</button>
                </div>
 
                <div id="peregon-select-container" style="display: none;">
                    <label class="track-label">Оберіть перегін (векторний фільтр):</label>
                    <div id="peregon-checkbox-group" class="checkbox-group-container"></div>
                </div>
            </div>
 
            <div id="diagram-render-zone" class="railway-canvas"></div>
        </div>
    </div>
 
    <button class="debug-toggle-btn" onclick="toggleDebugPanel()">🛠️</button>

    <div class="debug-panel" id="system-debug-panel">
        <div class="debug-title" style="display: flex; justify-content: space-between; align-items: center;">
            <span>🖥️ Монітор системи</span>
            <span onclick="toggleDebugPanel()" style="cursor:pointer; padding: 0 4px; font-weight: bold; color: #dc2626;">[Сховати]</span>
        </div>
        <div id="debug-console" class="debug-scroll"></div>
    </div>
 
    <div id="signal-toast" class="signal-toast" onclick="hideSignalToast()">
        <span id="toast-signal-name" class="signal-toast-accent"></span>
        <span id="toast-signal-type" class="signal-toast-text"></span>
    </div>

    <script>
        const fullKey = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        const baseDbUrl = "https://zcyntywoftcahfjwqldr.supabase.co";
 
        let tracksData = []; 
        let mowingData = [];
        let signalsData = [];
        let currentMode = 'pd';
        let toastTimeout;
 
        // Оновлено: Препенд для плавного моніторингу консолі як у master
        function logSys(text, status = 'info') {
            const con = document.getElementById('debug-console');
            if(!con) return;
            const div = document.createElement('div');
            if(status === 'success') div.style.color = '#16a34a';
            if(status === 'error') div.style.color = '#dc2626';
            div.innerText = "[" + new Date().toLocaleTimeString() + "]: " + text;
            con.prepend(div);
        }
 
        function toggleDebugPanel() {
            document.getElementById('system-debug-panel').classList.toggle('active');
        }

        function showSignalToast(element) {
            const name = element.getAttribute('data-name');
            const type = element.getAttribute('data-type');
            
            const toast = document.getElementById('signal-toast');
            document.getElementById('toast-signal-name').innerText = name;
            document.getElementById('toast-signal-type').innerText = type;
            
            toast.classList.add('show');
            logSys(`Перегляд сигналу ${name}: ${type}`, 'info');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(hideSignalToast, 4000);
        }

        function hideSignalToast() {
            const toast = document.getElementById('signal-toast');
            if (toast) toast.classList.remove('show');
        }

        async function initApp() {
            logSys("Запуск рейкової платформи...");
            await reloadDataFromCloud();
            document.getElementById('filter-pd-input').focus();
        }
 
        async function reloadDataFromCloud() {
            logSys("Завантаження даних із Supabase...");
            const headers = { 'apikey': fullKey, 'authorization': 'Bearer ' + fullKey };
            try {
                const resTracks = await fetch(`${baseDbUrl}/rest/v1/lines_config?select=*`, { headers });
                tracksData = await resTracks.json();
 
                const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing?select=*`, { headers });
                mowingData = await resMowing.json();
 
                const resSignals = await fetch(`${baseDbUrl}/rest/v1/signals?select=*`, { headers });
                signalsData = await resSignals.json();
 
                logSys(`Синхронізовано з хмарою. Ліній: ${tracksData.length}, Світлофорів: ${signalsData.length}`, 'success');
            } catch (e) {
                logSys("Помилка завантаження: " + e.message, 'error');
            }
        }
 
        // Допоміжні функції парсингу та нормалізації з master
        function cleanPd(pdStr) { return pdStr ? pdStr.trim().toUpperCase() : ""; }

        function sanitizeString(str) {
            if (!str) return '';
            let s = str.toLowerCase().replace(/\s+/g, '');
            const map = {'e':'е', 'a':'а', 'o':'о', 'p':'р', 'c':'с', 'x':'х', 'i':'і', 'y':'у'};
            return s.split('').map(c => map[c] || c).join('');
        }
        
        function isLeftTrack(str) { return sanitizeString(str).includes('парна') && !sanitizeString(str).includes('непарна'); }
        function isRightTrack(str) { return sanitizeString(str).includes('непарна'); }

        function handlePdInput() {
            let inputEl = document.getElementById('filter-pd-input');
            let pdNum = inputEl.value.trim();
            const tabsBlock = document.getElementById('control-tabs-block');
            const container = document.getElementById('diagram-render-zone');
            const screenCard = document.getElementById('screen-charts');
            const mainTitle = document.getElementById('main-screen-title');
            const mainDesc = document.getElementById('main-screen-desc');
 
            if (!pdNum) {
                screenCard.classList.add('welcome-focus');
                tabsBlock.style.display = 'none';
                mainTitle.innerText = "ВХІД У СИСТЕМУ ДІАГРАМ";
                mainDesc.innerText = "введіть номер околотка для формування лінійного графіка";
                container.innerHTML = "";
                return;
            }
 
            if (pdNum.length > 2) {
                inputEl.value = pdNum.slice(0, 2);
                pdNum = inputEl.value;
            }
 
            screenCard.classList.remove('welcome-focus');
            tabsBlock.style.display = 'block';
            mainTitle.innerText = "ДВОКОЛІЙНА ДІАГРАМА";
            mainDesc.innerText = "Стан обкошування брівок парної та непарної колій";
 
            const fullPdName = "ПД-" + pdNum;
            const filtered = tracksData.filter(t => cleanPd(t.pd) === fullPdName && !sanitizeString(t.type).includes('станція'));
            const uniquePeregons = [...new Set(filtered.map(t => t.name))].sort();
            
            const checkboxGroup = document.getElementById('peregon-checkbox-group');
            checkboxGroup.innerHTML = "";
 
            if (uniquePeregons.length === 0) {
                checkboxGroup.innerHTML = "<p style='color:gray; font-size:12px; margin:0;'>Немає перегонів у цього ПД</p>";
            } else {
                uniquePeregons.forEach((p, index) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.value = p;
                    if (index === 0) chk.checked = true; 
                    chk.onchange = drawDoubleTrackDiagram;
 
                    label.appendChild(chk);
                    label.appendChild(document.createTextNode(p));
                    checkboxGroup.appendChild(label);
                });
            }
 
            drawDoubleTrackDiagram();
 
            if (pdNum.length === 2) {
                document.activeElement.blur(); 
                logSys("Клавіатуру згорнуто автоматично.");
            }
        }
 
        function switchDisplayMode(mode) {
            currentMode = mode;
            document.getElementById('tab-pd').classList.toggle('active', mode === 'pd');
            document.getElementById('tab-peregon').classList.toggle('active', mode === 'peregon');
            document.getElementById('peregon-select-container').style.display = (mode === 'peregon') ? 'block' : 'none';
             
            drawDoubleTrackDiagram();
        }
 
        // Оновлено: Порядок відображення робіт за правилом 30 та 45 днів
        function getPiketAnalysis(ownerPd, peregonName, trackType, km, pk) {
            if (!ownerPd) return { colorClass: 'status-unknown', label: 'Немає даних', days: '' };
            const record = mowingData.find(m => cleanPd(m.pd) === cleanPd(ownerPd) && parseInt(m.km) === km && parseInt(m.piket) === pk && (trackType === 'парна' ? isLeftTrack(m.track_type) : isRightTrack(m.track_type)));
            
            if (!record || record.status !== 'green') return { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
            if (!record.date) return { colorClass: 'status-clear-green', label: 'Обкошено', days: '0 дн.' };
 
            const diffDays = Math.ceil(Math.abs(new Date() - new Date(record.date)) / (1000 * 60 * 60 * 24));
 
            if (diffDays >= 45) return { colorClass: 'status-overgrown-red', label: 'Критично', days: `${diffDays} дн.` };
            if (diffDays >= 30) return { colorClass: 'status-warn-yellow', label: 'Увага', days: `${diffDays} дн.` };
            return { colorClass: 'status-clear-green', label: 'Обкошено', days: `${diffDays} дн.` };
        }
 
        // Оновлено: Повний перенос алгоритму побудови діаграми, сигналів, суміжних ПД та синіх станцій з master
        function drawDoubleTrackDiagram() {
            const pdNum = document.getElementById('filter-pd-input').value.trim();
            const container = document.getElementById('diagram-render-zone');
            if (!pdNum) return;
 
            const fullPdName = "ПД-" + pdNum;
            container.innerHTML = "";
            
            let segmentsToRender = [];
            let minKm, maxKm;
 
            if (currentMode === 'pd') {
                segmentsToRender = tracksData.filter(t => cleanPd(t.pd) === fullPdName);
                if (segmentsToRender.length === 0) {
                    container.innerHTML = "<p style='color:red; text-align:center;'>Конфігурацію ділянок не знайдено.</p>";
                    return;
                }
                minKm = Math.min(...segmentsToRender.map(s => parseInt(s.start_km)));
                maxKm = Math.max(...segmentsToRender.map(s => parseInt(s.end_km)));
            } else {
                const checkedBoxes = document.querySelectorAll('#peregon-checkbox-group input[type="checkbox"]:checked');
                const selectedPeregons = Array.from(checkedBoxes).map(cb => cb.value);
 
                if (selectedPeregons.length === 0) {
                    container.innerHTML = "<p style='color:gray; text-align:center; padding:10px;'>Оберіть хоча б один перегін.</p>";
                    return;
                }
 
                const purePeregons = tracksData.filter(t => selectedPeregons.includes(t.name) && cleanPd(t.pd) === fullPdName);
                if (purePeregons.length === 0) {
                    container.innerHTML = "<p style='color:red; text-align:center;'>Конфігурацію перегону не знайдено.</p>";
                    return;
                }
 
                minKm = Math.min(...purePeregons.map(s => parseInt(s.start_km)));
                maxKm = Math.max(...purePeregons.map(s => parseInt(s.end_km)));
                segmentsToRender = [...purePeregons];
            }
 
            for (let km = minKm; km <= maxKm; km++) {
                 
                const kmSign = document.createElement('div');
                kmSign.className = 'km-signboard';
                kmSign.innerText = `Кілометр ${km}`;
                container.appendChild(kmSign);
 
                const headersRow = document.createElement('div');
                headersRow.className = 'track-headers-row';
                headersRow.innerHTML = `
                    <div class="header-margin-space"></div>
                    <div class="header-left-track">ПАРНА</div>
                    <div class="header-center-space"></div>
                    <div class="header-right-track">НЕПАРНА</div>
                    <div class="header-margin-space"></div>
                `;
                container.appendChild(headersRow);
 
                for (let pk = 1; pk <= 10; pk++) {
                    // Збір усіх конфігурацій для поточного пікета для виявлення станцій та суміжних ліній
                    let configsForPk = tracksData.filter(s => {
                        let sKm = parseInt(s.start_km), eKm = parseInt(s.end_km);
                        let sPk = parseInt(s.start_pk), ePk = parseInt(s.end_pk);
                        sPk = isNaN(sPk) ? 1 : sPk; ePk = isNaN(ePk) ? 10 : ePk;
                        if (km < sKm || km > eKm) return false;
                        if (km === sKm && pk < sPk) return false;
                        if (km === eKm && pk > ePk) return false;
                        return true;
                    });
 
                    let leftConfigs = configsForPk.filter(s => sanitizeString(s.type) !== 'станція' && isLeftTrack(s.track_type));
                    let rightConfigs = configsForPk.filter(s => sanitizeString(s.type) !== 'станція' && isRightTrack(s.track_type));
                    let leftStationConfigs = configsForPk.filter(s => sanitizeString(s.type) === 'станція' && (isLeftTrack(s.track_type) || !s.track_type || s.track_type.trim() === ''));
                    let rightStationConfigs = configsForPk.filter(s => sanitizeString(s.type) === 'станція' && (isRightTrack(s.track_type) || !s.track_type || s.track_type.trim() === ''));
 
                    let leftConfig = leftConfigs.find(s => cleanPd(s.pd) === fullPdName) || leftConfigs[0];
                    let rightConfig = rightConfigs.find(s => cleanPd(s.pd) === fullPdName) || rightConfigs[0];
                    let leftStationConfig = leftStationConfigs.find(s => cleanPd(s.pd) === fullPdName) || leftStationConfigs[0];
                    let rightStationConfig = rightStationConfigs.find(s => cleanPd(s.pd) === fullPdName) || rightStationConfigs[0];
 
                    let finalLeftConfig = leftStationConfig || leftConfig;
                    let finalRightConfig = rightStationConfig || rightConfig;
 
                    let finalLeftName = finalLeftConfig ? finalLeftConfig.name : "Невідомо";
                    let finalRightName = finalRightConfig ? finalRightConfig.name : "Невідомо";
                    let leftOwnerPd = finalLeftConfig ? finalLeftConfig.pd : null;
                    let rightOwnerPd = finalRightConfig ? finalRightConfig.pd : null;
 
                    let isLeftMine = cleanPd(leftOwnerPd) === fullPdName;
                    let isRightMine = cleanPd(rightOwnerPd) === fullPdName;
                    let isLeftStation = !!leftStationConfig;
                    let isRightStation = !!rightStationConfig;
 
                    const leftSide = getPiketAnalysis(leftOwnerPd, finalLeftName, 'парна', km, pk);
                    const rightSide = getPiketAnalysis(rightOwnerPd, finalRightName, 'непарна', km, pk);
 
                    const nodeRow = document.createElement('div');
                    nodeRow.className = 'piket-rail-node';
 
                    // БОКОВЕ ПОЛЕ ЛІВЕ + СТАНЦІЙНА СИНЯ ДУЖКА
                    const leftMargin = document.createElement('div');
                    leftMargin.className = `info-margin margin-left ${isLeftStation ? 'station-bracket-left' : ''}`;
                    
                    const leftSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && isLeftTrack(s.track_type));
                    if (leftSignal) {
                        const signalNote = leftSignal.signal_type || leftSignal.signal || 'Примітка відсутня';
                        leftMargin.innerHTML = `
                            <span class="signal-badge" 
                                  style="cursor: pointer;" 
                                  data-name="${leftSignal.signal_name}" 
                                  data-type="${signalNote}" 
                                  onclick="showSignalToast(this)">
                                ${leftSignal.signal_name}
                            </span>`;
                    }
                    nodeRow.appendChild(leftMargin);
 
                    // БРІВКА ПАРНА (З урахуванням логіки яскравості за ПД)
                    const leftBank = document.createElement('div');
                    leftBank.className = `mowing-bank-zone ${leftSide.colorClass}`;
                    if (!isLeftMine) {
                        leftBank.classList.add('inactive-bank');
                        let ownerLabel = leftOwnerPd ? ` (${leftOwnerPd})` : '';
                        leftBank.innerHTML = `<div>${leftSide.label}</div><div style="font-size:9px; opacity:0.85; font-weight:bold; color:#334155;">${leftSide.days}${ownerLabel}</div>`;
                    } else {
                        leftBank.innerHTML = `<div>${leftSide.label}</div><div style="font-size:9px; opacity:0.85;">${leftSide.days}</div>`;
                    }
                    nodeRow.appendChild(leftBank);
 
                    const leftTrackVisual = document.createElement('div');
                    leftTrackVisual.className = 'rail-line-visual';
                    leftTrackVisual.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(leftTrackVisual);
 
                    // ЦЕНТРАЛЬНЕ ЯДРО ПІКЕТА (Підсвічується зеленим для станцій як у master)
                    const centerPiket = document.createElement('div');
                    centerPiket.className = 'piket-center-core';
                    centerPiket.innerText = pk;
                    if (isLeftStation || isRightStation) {
                        centerPiket.style.background = '#0d9488';
                        centerPiket.style.color = 'white';
                        centerPiket.style.borderColor = '#0f766e';
                    }
                    nodeRow.appendChild(centerPiket);
 
                    const rightTrackVisual = document.createElement('div');
                    rightTrackVisual.className = 'rail-line-visual';
                    rightTrackVisual.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(rightTrackVisual);
 
                    // БРІВКА НЕПАРНА (З урахуванням логіки яскравості за ПД)
                    const rightBank = document.createElement('div');
                    rightBank.className = `mowing-bank-zone ${rightSide.colorClass}`;
                    if (!isRightMine) {
                        rightBank.classList.add('inactive-bank');
                        let ownerLabel = rightOwnerPd ? ` (${rightOwnerPd})` : '';
                        rightBank.innerHTML = `<div>${rightSide.label}</div><div style="font-size:9px; opacity:0.85; font-weight:bold; color:#334155;">${rightSide.days}${ownerLabel}</div>`;
                    } else {
                        rightBank.innerHTML = `<div>${rightSide.label}</div><div style="font-size:9px; opacity:0.85;">${rightSide.days}</div>`;
                    }
                    nodeRow.appendChild(rightBank);
                    
                    // БОКОВЕ ПОЛЕ ПРАВЕ + СТАНЦІЙНА СИНЯ ДУЖКА
                    const rightMargin = document.createElement('div');
                    rightMargin.className = `info-margin margin-right ${isRightStation ? 'station-bracket-right' : ''}`;
                    
                    const rightSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && isRightTrack(s.track_type));
                    if (rightSignal) {
                        const signalNote = rightSignal.signal_type || rightSignal.signal || 'Примітка відсутня';
                        rightMargin.innerHTML = `
                            <span class="signal-badge" 
                                  style="cursor: pointer;" 
                                  data-name="${rightSignal.signal_name}" 
                                  data-type="${signalNote}" 
                                  onclick="showSignalToast(this)">
                                ${rightSignal.signal_name}
                            </span>`;
                    }
                    nodeRow.appendChild(rightMargin);
 
                    container.appendChild(nodeRow);
                }
            }
            logSys(`Діаграму оновлено успішно.`, 'info');
        }
 
        window.onload = initApp;
    </script>
</body>
