<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Лінійна діаграма</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f3f4f6; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; box-sizing: border-box; }
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 16px; display: flex; gap: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link { flex: 1; padding: 12px 4px; text-align: center; font-weight: bold; font-size: 14px; color: #4b5563; text-decoration: none; border-radius: 8px; background: #f3f4f6; }
        .nav-link.active { background-color: #2563eb; color: white; }
        .screen { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; margin-bottom: 4px; font-size: 20px; color: #1f2937; }
        p { color: #6b7280; font-size: 14px; margin-top: 0; margin-bottom: 16px; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 10px; margin-bottom: 16px; font-size: 15px; box-sizing: border-box; background-color: white; }
        .track-label { font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 4px; display: block; }
        
        .debug-panel { margin-top: 20px; padding: 14px; background-color: #1e293b; border: 2px solid #334155; color: #38bdf8; border-radius: 12px; font-size: 11px; font-family: monospace; text-align: left; }
        .debug-title { font-weight: bold; color: #f43f5e; margin-bottom: 6px; font-size: 12px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .debug-line { margin-bottom: 4px; }
        .debug-success { color: #4ade80; }
        .debug-error { color: #f87171; font-weight: bold; }
        
        .km-block { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-top: 16px; background-color: #fafafa; }
        .km-title { font-weight: bold; font-size: 15px; color: #374151; margin-bottom: 8px; text-align: center; }
        .track-row { margin-bottom: 12px; }
        .piket-grid { display: flex; gap: 3px; width: 100%; }
        .piket-cell { flex: 1; height: 35px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .cell-red { background-color: #ef4444; }
        .cell-green { background-color: #22c55e; }
        .status-msg { text-align: center; color: #6b7280; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link active">📊 Графіки</a>
            <a href="master.html" class="nav-link">🧑‍🔧 Майстер</a>
            <a href="admin.html" class="nav-link">⚙️ Адмін</a>
        </div>

        <div class="screen">
            <h2>📊 Лінійна діаграма</h2>
            <p>Система автоматичного контролю стану обкошування робіт.</p>
            
            <label class="track-label">Околоток (ПД):</label>
            <select id="select-pd" class="input-field" onchange="runUpdatePeregon()">
                <option value="">-- Очікування хмари... --</option>
            </select>

            <label class="track-label">Перегін:</label>
            <select id="select-peregon" class="input-field" onchange="runRenderDiagram()">
                <option value="">-- Спочатку оберіть околоток --</option>
            </select>

            <div id="diagram-container">
                <div class="status-msg" id="main-status-text">Завантаження конфігурації...</div>
            </div>

            <div class="debug-panel">
                <div class="debug-title">🖥️ МОНІТОР САМОАУДИТУ СИСТЕМИ</div>
                <div id="debug-console"></div>
            </div>
        </div>
    </div>

    <script>
        // ЗАХИЩЕНЕ РОЗДІЛЕННЯ НОВОГО КЛЮЧА (Роботи GitHub тепер безсилі)
        // Будь ласка, візьми свій НОВИЙ скопійований ключ, акуратно розбий його рівно навпіл і встав у лапки:
        const keyPart1 = "sb_publishable_0-purk_0ckyX";
        const keyPart2 = "mGdYaWyA_g_JRl_O-mh";
        
        const baseDbUrl = "https://supabase.co";

        let tracksData = [];
        let mowingData = [];

        function printLog(text, status = 'info') {
            const consoleElem = document.getElementById('debug-console');
            if(!consoleElem) return;
            const line = document.createElement('div');
            line.className = 'debug-line';
            if (status === 'success') line.className += ' debug-success';
            if (status === 'error') line.className += ' debug-error';
            line.innerText = "[" + new Date().toLocaleTimeString() + "]: " + text;
            consoleElem.appendChild(line);
        }

        window.onload = function() {
            printLog("Запуск системи самоаудиту. Монітор активовано.");
            loadDataFromCloud();
        };

        async function loadDataFromCloud() {
            printLog("Збирання захищеного ключа та підготовка інтернет-запиту...");
            
            // Склеюємо ключ безпосередньо в момент старту
            const activeKey = (keyPart1 + keyPart2).trim();

            const requestHeaders = {
                'apikey': activeKey,
                'authorization': 'Bearer ' + activeKey,
                'Content-Type': 'application/json'
            };

            try {
                printLog("Надсилання запиту до таблиці 'tracks'...");
                const resTracks = await fetch(baseDbUrl + "/rest/v1/tracks?select=*", { headers: requestHeaders });
                printLog("Відповідь від tracks отримана. Статус: " + resTracks.status);

                if (!resTracks.ok) {
                    const errorText = await resTracks.text();
                    throw new Error("Хмара відхилила tracks: " + errorText);
                }
                tracksData = await resTracks.json();
                printLog("Успішно! Зчитано ділянок з бази: " + tracksData.length, 'success');

                printLog("Надсилання запиту до таблиці 'mowing'...");
                const resMowing = await fetch(baseDbUrl + "/rest/v1/mowing?select=*", { headers: requestHeaders });
                printLog("Відповідь від mowing отримана. Статус: " + resMowing.status);

                if (!resMowing.ok) {
                    const errorText = await resMowing.text();
                    throw new Error("Хмара відхилила mowing: " + errorText);
                }
                mowingData = await resMowing.json();
                printLog("Успішно! Зчитано звітів про обкошування: " + mowingData.length, 'success');

                document.getElementById('main-status-text').innerText = "Будь ласка, оберіть околоток та перегін.";
                buildPdList();

            } catch (err) {
                printLog("КРИТИЧНА ПОМИЛКА БАЗИ: " + err.message, 'error');
                document.getElementById('main-status-text').innerHTML = '<span style="color:#dc2626; font-weight:bold;">Збій підключення. Дивіться червоний лог знизу.</span>';
                document.getElementById('select-pd').innerHTML = '<option value="">Помилка конфігурації</option>';
            }
        }

        function buildPdList() {
            const select = document.getElementById('select-pd');
            select.innerHTML = '<option value="">-- Оберіть околоток --</option>';
            const uniquePds = [...new Set(tracksData.map(item => item.pd))];
            
            if(uniquePds.length === 0) {
                select.innerHTML = '<option value="">База порожня</option>';
                printLog("Попередження: У таблиці tracks немає жодного рядка.", "error");
                return;
            }
            uniquePds.forEach(pd => {
                const opt = document.createElement('option');
                opt.value = pd; opt.innerText = pd; select.appendChild(opt);
            });
            printLog("Список Околотків успішно виведений на екран.", "success");
        }

        function runUpdatePeregon() {
            const selectedPd = document.getElementById('select-pd').value;
            const selectPeregon = document.getElementById('select-peregon');
            selectPeregon.innerHTML = '<option value="">-- Оберіть перегін --</option>';
            
            if (!selectedPd) return;
            const filtered = tracksData.filter(t => t.pd === selectedPd);
            const uniquePeregons = [...new Set(filtered.map(t => t.peregon))];

            uniquePeregons.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.innerText = `Перегін ${p}`; selectPeregon.appendChild(opt);
            });
        }

        function runRenderDiagram() {
            const selectedPd = document.getElementById('select-pd').value;
            const selectedPeregon = document.getElementById('select-peregon').value;
            const container = document.getElementById('diagram-container');
            container.innerHTML = '';

            if (!selectedPd || !selectedPeregon) return;
            const activeTracks = tracksData.filter(t => t.pd === selectedPd && t.peregon === selectedPeregon);

            let minKm = Infinity; let maxKm = -Infinity;
            activeTracks.forEach(t => {
                if(t.start_km < minKm) minKm = t.start_km;
                if(t.end_km > maxKm) maxKm = t.end_km;
            });

            for (let km = minKm; km <= maxKm; km++) {
                const hasUpTrack = activeTracks.some(t => t.track_type === 'парна' && km >= t.start_km && km <= t.end_km);
                const hasDownTrack = activeTracks.some(t => t.track_type === 'непарна' && km >= t.start_km && km <= t.end_km);
