<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Панель адміністратора (Матча)</title>
    <style>
        /* Фірмове легке фісташкове тло */
        body { font-family: -apple-system, sans-serif; background-color: #f0fdf4; margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 580px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Навігаційне меню у шавлієвих тонах */
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 12px; display: flex; gap: 6px; box-shadow: 0 4px 10px rgba(11, 94, 89, 0.06); width: 100%; box-sizing: border-box; align-items: center; border: 1px solid #d1fae5; }
        .nav-link { flex: 1; padding: 12px 4px; text-align: center; font-weight: bold; font-size: 14px; color: #115e59; text-decoration: none; border-radius: 8px; background: #f0fdf4; cursor: pointer; }
        .nav-link.active { background-color: #115e59; color: white; }
        
        /* Головна картка конфігурації */
        .screen { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(11, 94, 89, 0.05); width: 100%; box-sizing: border-box; margin-bottom: 12px; border: 1px solid #d1fae5; }
        
        .header-block { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; position: relative; }
        h2 { margin: 0; font-size: 19px; color: #115e59; font-weight: 800; text-align: center; }
        .db-status-badge { position: absolute; right: 0; background-color: #115e59; color: white; font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: bold; display: flex; align-items: center; gap: 4px; text-decoration: none; }
        p { color: #0f766e; font-size: 13px; margin-top: 0; margin-bottom: 20px; text-align: center; opacity: 0.8; }
        
        /* Стильні вкладки типу об'єкта */
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #f0fdf4; padding: 4px; border-radius: 10px; border: 1px solid #c2e7d9; }
        .tab-btn { flex: 1; padding: 11px; border: none; background: transparent; border-radius: 7px; color: #115e59; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .tab-btn.active { background: #0d9488; color: white; }
        
        /* Чекбокси у стилі кнопок */
        .track-checkbox-block { display: flex; gap: 8px; background: #f0fdf4; padding: 6px; border-radius: 10px; border: 1px solid #c2e7d9; margin-bottom: 16px; }
        .check-btn-label { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; background: white; border: 1px solid #a7f3d0; border-radius: 8px; color: #115e59; font-weight: bold; font-size: 13px; cursor: pointer; user-select: none; transition: all 0.2s; }
        .check-btn-label input { width: 16px; height: 16px; accent-color: #0d9488; cursor: pointer; }
        .check-btn-label.checked-active { background: #e6f4ea; border-color: #0d9488; box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.1); }

        /* Поля введення */
        .track-label { font-size: 11px; font-weight: 700; color: #115e59; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field { width: 100%; padding: 11px; border: 1px solid #a7f3d0; border-radius: 10px; margin-bottom: 16px; font-size: 14px; box-sizing: border-box; background-color: white; color: #115e59; font-weight: 500; transition: border-color 0.2s, box-shadow 0.2s; }
        .input-field:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15); }
        
        /* Введення ПД з префіксом */
        .pd-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .pd-prefix { font-size: 16px; font-weight: bold; color: #115e59; }
        .pd-number-box { width: 80px !important; margin-bottom: 0 !important; text-align: center; }

        /* Сітка меж кілометрів та пікетів */
        .limits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .limit-cell { display: flex; flex-direction: column; }
        
        select.input-field { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23115e59' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 30px; cursor: pointer; }

        /* Головна кнопка дії */
        .submit-btn { width: 100%; padding: 14px; background-color: #0d9488; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); transition: all 0.2s; text-align: center; }
        .submit-btn:hover { background-color: #0f766e; box-shadow: 0 6px 16px rgba(15, 118, 110, 0.25); transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(1px); }

        /* Системний монітор */
        .debug-panel { padding: 12px; background-color: #e6f4ea; border: 1px solid #c2e7d9; color: #115e59; border-radius: 12px; font-size: 11px; font-family: monospace; box-shadow: 0 2px 4px rgba(11,94,89,0.02); }
        .debug-title { font-weight: bold; color: #0f766e; margin-bottom: 4px; border-bottom: 1px solid #c2e7d9; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .debug-scroll { max-height: 80px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
 
    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link" id="nav-btn-charts">📊 Графіки</a>
            <a href="master.html" class="nav-link" id="nav-btn-master">🧑‍🔧 Майстер</a>
            <a href="#" class="nav-link active" id="nav-btn-admin">⚙️ Налаштування</a>
        </div>
 
        <div class="screen">
            <div class="header-block">
                <h2>⚙️ Конфігурація</h2>
                <a href="https://supabase.com" target="_blank" class="db-status-badge">🗄️ База даних</a>
            </div>
            <p>Налаштування інфраструктури залізничних ділянок</p>
            
            <label class="track-label">1. Введіть околоток:</label>
            <div class="pd-input-row">
                <span class="pd-prefix">ПД-</span>
                <input type="number" id="cfg-pd-input" class="input-field pd-number-box" value="13">
            </div>

            <label class="track-label">2. Оберіть тип та назву об'єкта:</label>
            <div class="mode-tabs">
                <button id="tab-type-peregon" class="tab-btn active" onclick="setObjectType('перегін')">Перегін</button>
                <button id="tab-type-station" class="tab-btn" onclick="setObjectType('станція')">Станція</button>
            </div>

            <input type="text" id="cfg-object-name" class="input-field" placeholder="Назва перегону (наприклад: Путивль - Кошари)">

            <label class="track-label">3. Оберіть колію:</label>
            <div class="track-checkbox-block">
                <label id="lbl-chk-neparna" class="check-btn-label checked-active">
                    <input type="checkbox" id="cfg-chk-neparna" checked onchange="toggleCheckClass('cfg-chk-neparna', 'lbl-chk-neparna')"> Непарна
                </label>
                <label id="lbl-chk-parna" class="check-btn-label checked-active">
                    <input type="checkbox" id="cfg-chk-parna" checked onchange="toggleCheckClass('cfg-chk-parna', 'lbl-chk-parna')"> Парна
                </label>
            </div>

            <label class="track-label">4. Визначте лінійні межі:</label>
            <div class="limits-grid">
                <div class="limit-cell">
                    <span style="font-size:11px; color:#0f766e; margin-bottom:4px; font-weight:600;">Початок (КМ)</span>
                    <input type="number" id="cfg-start-km" class="input-field" placeholder="Напр. 64" value="64">
                </div>
                <div class="limit-cell">
                    <span style="font-size:11px; color:#0f766e; margin-bottom:4px; font-weight:600;">Початок (ПК)</span>
                    <select id="cfg-start-pk" class="input-field">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5" selected>5</option><option value="6">6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <div class="limit-cell">
                    <span style="font-size:11px; color:#0f766e; margin-bottom:4px; font-weight:600;">Кінець (КМ)</span>
                    <input type="number" id="cfg-end-km" class="input-field" placeholder="Напр. 66" value="66">
                </div>
                <div class="limit-cell">
                    <span style="font-size:11px; color:#0f766e; margin-bottom:4px; font-weight:600;">Кінець (ПК)</span>
                    <select id="cfg-end-pk" class="input-field">
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6" selected>6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
            </div>
 
            <button class="submit-btn" onclick="saveConfigToCloud()">Зберегти в базу даних</button>
        </div>
 
        <div class="debug-panel">
            <div class="debug-title">🖥️ Монітор адміністратора</div>
            <div id="admin-console" class="debug-scroll"></div>
        </div>
    </div>
 
    <script>
        // Конфігурація підключення до Supabase
        const fullKey = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        const baseDbUrl = "https://zcyntywoftcahfjwqldr.supabase.co";
 
        let currentObjectType = 'перегін';

        function logAdmin(text, status = 'info') {
            const con = document.getElementById('admin-console');
            if(!con) return;
            const div = document.createElement('div');
            if(status === 'success') div.style.color = '#16a34a';
            if(status === 'error') div.style.color = '#dc2626';
            div.innerText = "[" + new Date().toLocaleTimeString() + "]: " + text;
            con.appendChild(div);
            con.scrollTop = con.scrollHeight;
        }

        // Керування перемикачем типів об'єкта (Перегін / Станція)
        function setObjectType(type) {
            currentObjectType = type;
            const isStation = (type === 'станція');
            
            document.getElementById('tab-type-peregon').classList.toggle('active', !isStation);
            document.getElementById('tab-type-station').classList.toggle('active', isStation);
            
            const nameField = document.getElementById('cfg-object-name');
            if(isStation) {
                nameField.placeholder = "Назва станції (наприклад: Кошари)";
            } else {
                nameField.placeholder = "Назва перегону (наприклад: Путивль - Кошари)";
            }
            logAdmin(`Обрано режим конфігурації: ${type.toUpperCase()}`);
        }

        // Візуальний відгук на натискання чекбоксів колій
        function toggleCheckClass(checkboxId, labelId) {
            const chk = document.getElementById(checkboxId);
            const lbl = document.getElementById(labelId);
            if (chk && lbl) {
                lbl.classList.toggle('checked-active', chk.checked);
            }
        }

        // Головна функція збирання та відправки даних
        async function saveConfigToCloud() {
            const pdNum = document.getElementById('cfg-pd-input').value.trim();
            const objectName = document.getElementById('cfg-object-name').value.trim();
            const startKm = parseInt(document.getElementById('cfg-start-km').value);
            const startPk = parseInt(document.getElementById('cfg-start-pk').value);
            const endKm = parseInt(document.getElementById('cfg-end-km').value);
            const endPk = parseInt(document.getElementById('cfg-end-pk').value);

            // Валідація даних форми
            if(!pdNum) { alert("Вкажіть номер ПД!"); return; }
            if(!objectName) { alert("Введіть назву об'єкта!"); return; }
            if(isNaN(startKm) || isNaN(endKm)) { alert("Заповніть лінійні координати КМ!"); return; }

            const isNeparna = document.getElementById('cfg-chk-neparna').checked;
            const isParna = document.getElementById('cfg-chk-parna').checked;

            if(!isNeparna && !isParna) {
                alert("Оберіть принаймні одну колію (Парна/Непарна)!");
                return;
            }

            const fullPdName = "ПД-" + pdNum;
            const rowsToInsert = [];

            // Автоматичне динамічне формування структур даних залежно від обраного типу
            if (currentObjectType === 'станція') {
                if (isNeparna) {
                    rowsToInsert.push({
                        pd: fullPdName,
                        type: 'станція',
                        name: objectName,
                        track_type: 'станція_головна_непарна', // автопідстановка під графік
                        start_km: startKm,
                        start_pk: startPk,
                        end_km: endKm,
                        end_pk: endPk
                    });
                }
                if (isParna) {
                    rowsToInsert.push({
                        pd: fullPdName,
                        type: 'станція',
                        name: objectName,
                        track_type: 'станція_головна_парна', // автопідстановка під графік
                        start_km: startKm,
                        start_pk: startPk,
                        end_km: endKm,
                        end_pk: endPk
                    });
                }
            } else {
                // Конфігурація для класичного перегону
                if (isNeparna) {
                    rowsToInsert.push({
                        pd: fullPdName,
                        type: 'перегін',
                        name: objectName,
                        track_type: 'непарна',
                        start_km: startKm,
                        start_pk: startPk,
                        end_km: endKm,
                        end_pk: endPk
                    });
                }
                if (isParna) {
                    rowsToInsert.push({
                        pd: fullPdName,
                        type: 'перегін',
                        name: objectName,
                        track_type: 'парна',
                        start_km: startKm,
                        start_pk: startPk,
                        end_km: endKm,
                        end_pk: endPk
                    });
                }
            }

            logAdmin(`Надсилання даних конфігурації у хмару Supabase...`);
            
            const headers = { 
                'apikey': fullKey, 
                'authorization': 'Bearer ' + fullKey,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            };

            try {
                const response = await fetch(`${baseDbUrl}/rest/v1/lines_config`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(rowsToInsert)
                });

                if (response.ok) {
                    logAdmin(`Записів додано успішно: ${rowsToInsert.length}. Об'єкт: "${objectName}"`, 'success');
                    alert(`Успішно додано об'єкт "${objectName}" у конфігурацію ліній!`);
                    
                    // Очищення текстового поля після вдалої відправки
                    document.getElementById('cfg-object-name').value = "";
                } else {
                    const errRes = await response.json();
                    logAdmin(`Помилка бази даних: ${JSON.stringify(errRes)}`, 'error');
                    alert("Помилка бази даних під час збереження.");
                }
            } catch (e) {
                logAdmin(`Помилка запиту: ${e.message}`, 'error');
                alert("Мережева помилка відправки запиту: " + e.message);
            }
        }

        window.onload = function() {
            logAdmin("Панель конфігурації готова до роботи.");
        };
    </script>
</body>
</html>
