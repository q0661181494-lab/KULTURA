<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #008b74;
            --primary-hover: #006e5c;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            --color-red: #ef4444;
            --color-yellow: #eab308;
            --color-green: #22c55e;
            --accent-checkbox: #008b74;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        /* Налаштування body для мобільних дисплеїв */
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); }
        
        body { 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            position: relative;
        }

        /* Основний контейнер для контенту (займає весь доступний простір, крім монітора) */
        .main-content {
            flex: 1 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 110px 20px; /* Великий нижній паддінг, щоб картки не перекривалися монітором на малих екранах */
        }
        
        /* НАВІГАЦІЯ */
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .nav-btn { flex: 1; background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .nav-btn:hover { background: #f8fafc; }
        .nav-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .settings-btn { background: #fff; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; cursor: pointer; font-size: 16px; }

        .card { background: var(--card-bg); border-radius: 16px; padding: 25px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid rgba(0, 139, 116, 0.1); margin-bottom: 20px; }
        .card-title { font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 800; font-size: 12px; margin-bottom: 8px; color: var(--primary-color); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--primary-color); border-radius: 10px; font-size: 15px; outline: none; }
        
        /* РОЗГОРТАЮЧИЙ СПИСОК */
        details { border: 1px solid var(--primary-color); border-radius: 10px; padding: 10px; background: #f8fafc; margin-bottom: 10px; }
        summary { cursor: pointer; font-weight: bold; color: var(--primary-color); padding: 5px; outline: none; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '▼'; font-size: 10px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        input[type="checkbox"] { accent-color: var(--accent-checkbox); transform: scale(1.2); margin-right: 8px; }

        .btn-submit { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* ЖОРСТКЕ ПРИТИСКАННЯ МОНІТОРА ДО НИЗУ ДИСПЛЕЯ */
        .debug-panel {
            flex-shrink: 0;
            width: 100%;
            max-width: 580px;
            position: fixed; /* Фіксуємо на екрані телефону */
            bottom: 10px; /* Відступ від самого низу дисплея */
            left: 50%;
            transform: translateX(-50%); /* Центрування по горизонталі */
            z-index: 9999; /* Поверх усіх елементів */
            padding: 10px; 
            background-color: rgba(230, 244, 234, 0.95); /* Трохи щільніший фон, щоб текст під ним не просвічувався */
            backdrop-filter: blur(6px);
            border: 1px solid #c2e7d9; 
            color: #115e59; 
            border-radius: 12px; 
            font-size: 11px; 
            font-family: monospace; 
            box-shadow: 0 -4px 15px rgba(11,94,89,0.1);
            box-sizing: border-box;
        }
        @media (max-width: 600px) {
            .debug-panel {
                width: calc(100% - 20px); /* Враховуємо бокові відступи на смартфонах */
            }
        }
        .debug-title { font-weight: bold; color: #0f766e; margin-bottom: 4px; border-bottom: 1px solid #c2e7d9; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .debug-scroll { max-height: 60px; overflow-y: auto; text-align: left; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="nav-container">
            <button class="nav-btn" onclick="window.location.href='index.html'">📊 Графіки</button>
            <button class="nav-btn active">🚪 Кабінет ПД</button>
            <button class="settings-btn" onclick="window.location.href='admin.html'">⚙️</button>
        </div>

        <div id="login-card" class="card">
            <div class="card-title">🧑‍🔧 Вхід для ПД</div>
            <div class="form-group">
                <label>ПАРОЛЬ:</label>
                <input type="password" id="password-input" class="form-control" placeholder="••••" value="" autocomplete="off">
            </div>
            <button class="btn-submit" id="login-submit-btn" onclick="executeLogin()">Увійти в кабінет</button>
        </div>

        <div id="cabinet-card" class="card hidden">
            <div class="card-title">Налаштування робіт</div>
            
            <form id="mowing-form" onsubmit="handleFormSubmit(event)">
                <details>
                    <summary>Оберіть перегони</summary>
                    <div id="peregon-container" class="checkbox-group"></div>
                </details>

                <details>
                    <summary>Оберіть колії</summary>
                    <div id="track-container" class="checkbox-group"></div>
                </details>

                <div class="form-group">
                    <label>РУЧНИЙ ВВІД КМ (через кому):</label>
                    <input type="text" id="manual-km-input" class="form-control" placeholder="Наприклад: 12, 14, 25">
                </div>

                <button type="submit" class="btn-submit">Побудувати діаграму</button>
            </form>
        </div>
    </div>

    <div class="debug-panel">
        <div class="debug-title">🖥️ Монітор системи</div>
        <div id="monitor-logs" class="debug-scroll"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        let supabaseClient, linesConfigList = [];

        function log(text, type = 'info') {
            const el = document.getElementById('monitor-logs');
            const div = document.createElement('div');
            if (type === 'error') div.style.color = '#dc2626';
            if (type === 'success') div.style.color = '#16a34a';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            log("Система ініціалізована...", "info");
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { error } = await supabaseClient.from('lines_config').select('pd').limit(1);
                if (error) throw error;
                log("Підключення до хмари активне", "success");
            } catch (e) {
                log("Помилка зв'язку: " + e.message, "error");
            }
        });

        async function executeLogin() {
            const passInput = document.getElementById('password-input');
            const pass = passInput.value.trim();
            
            if (!/^\d{4}$/.test(pass)) {
                log("Помилка: Пароль має бути 4 цифри", "error");
                return;
            }
            
            passInput.value = "";
            const pd = `ПД-${pass.slice(0, 2)}`;
            log(`Спроба входу для ${pd}...`);

            const { data, error } = await supabaseClient.from('lines_config').select('*').eq('pd', pd);
            if (error) { log("Помилка БД: " + error.message, "error"); return; }
            if (!data || data.length === 0) { log("Невірний пароль або немає даних", "error"); return; }
            
            linesConfigList = data;
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('cabinet-card').classList.remove('hidden');
            
            renderSelections();
            log("Вхід успішний", "success");
        }

        function renderSelections() {
            const pContainer = document.getElementById('peregon-container');
            const tContainer = document.getElementById('track-container');
            
            const peregons = [...new Set(linesConfigList.map(i => i.name))];
            const tracks = [...new Set(linesConfigList.map(i => i.track_type))];

            pContainer.innerHTML = peregons.map(p => `<label><input type="checkbox" value="${p}"> ${p}</label>`).join('');
            tContainer.innerHTML = tracks.map(t => `<label><input type="checkbox" value="${t}"> ${t}</label>`).join('');
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const selectedPeregons = Array.from(document.querySelectorAll('#peregon-container input:checked')).map(i => i.value);
            const manualKmStr = document.getElementById('manual-km-input').value;
            const manualKm = manualKmStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));

            if (selectedPeregons.length === 0 || manualKm.length === 0) {
                log("Помилка: Оберіть перегін та введіть КМ", "error");
                return;
            }
            log(`Побудова для: ${selectedPeregons.join(', ')} | КМ: ${manualKm.join(', ')}`, "success");
        }
    </script>
</body>
</html>
