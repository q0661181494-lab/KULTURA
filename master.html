<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #eef9f5;
            --card-bg: #ffffff;
            --primary-teal: #0b9484;
            --primary-hover: #0a7e70;
            --dark-teal: #0e6b5e;
            --text-muted: #666;
            --border-color: #ccc;
            --monitor-bg: #eefdf7;
            --monitor-border: #cbeedd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        /* Вкладки навігації */
        .tabs-container {
            display: flex;
            background: white;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            align-items: center;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            color: #333;
            transition: all 0.2s;
        }

        .tab.active {
            background-color: var(--dark-teal);
            color: white;
        }

        .settings-btn {
            padding: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Картки інтерфейсу */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--dark-teal);
            margin-top: 0;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--primary-teal);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            color: var(--dark-teal);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-teal);
        }

        /* Вибір кілометрів */
        .km-dropdown {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        .km-header {
            padding: 12px;
            background: #f9f9f9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .km-list {
            padding: 10px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .km-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            background: #f5fdfa;
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid #e2f4ed;
        }

        /* Кнопки */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* Монітор самоаудиту */
        .monitor {
            background-color: var(--monitor-bg);
            border: 1px solid var(--monitor-border);
            border-radius: 8px;
            padding: 12px;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .monitor-title {
            color: #0c544b;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .log-line {
            margin: 3px 0;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .log-success { color: #27ae60; }
        .log-error { color: #c0392b; }
        .log-info { color: #2980b9; }
    </style>
</head>
<body>

<div class="container">

    <div class="tabs-container">
        <div class="tab" onclick="alert('Перехід на графіки...')">📊 Графіки</div>
        <div class="tab active">🧑‍🔧 Майстер</div>
        <div class="settings-btn">⚙️</div>
    </div>

    <div class="card" id="authCard">
        <h2 class="card-title">🧑‍🔧 Вхід для ПД</h2>
        <div class="card-subtitle">Внесіть дані про виконане обкошування на вашому околотку.</div>
        
        <div class="form-group">
            <label for="access_password">Пароль доступу:</label>
            <input type="password" id="access_password" class="form-control" placeholder="••••">
        </div>
        <button class="btn-submit" id="loginBtn">Увійти в кабінет</button>
    </div>

    <div class="card" id="cabinetCard" style="display: none;">
        <h2 class="card-title">🧑‍🔧 Кабінет: <span id="pd-title">ПД-13</span></h2>
        <div class="card-subtitle">Оберіть ділянку, дату та відмітьте потрібні кілометри.</div>

        <div class="form-group">
            <label for="peregon">Перегін:</label>
            <select id="peregon" class="form-control">
                <option value="" disabled selected>Завантаження даних...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="track_type">Колія:</label>
            <select id="track_type" class="form-control" disabled>
                <option value="" disabled selected>Спочатку оберіть перегін</option>
            </select>
        </div>

        <div class="form-group">
            <label for="work_date">Дата виконання робіт:</label>
            <input type="date" id="work_date" class="form-control">
        </div>

        <div class="form-group">
            <label>Вибір кілометрів:</label>
            <div class="km-dropdown">
                <div class="km-header" id="kmHeaderBtn">
                    <span>📂 Показати список кілометрів (<span id="selectedCount">обрано: 0</span>)</span>
                    <span>🔽</span>
                </div>
                <div class="km-list" id="kmListContainer"></div>
            </div>
        </div>

        <button class="btn-submit" id="submitBtn">Внести дані (відкрити діаграму)</button>
    </div>

    <div class="monitor">
        <div class="monitor-title">💻 Монітор самоаудиту системи</div>
        <div id="monitorLogs"></div>
    </div>

</div>

<script>
    // --- КОНФІГУРАЦІЯ БАЗИ ДАНИХ ---
    const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co";
    
    // ⚠️ ОБОВ'ЯЗКОВО ВСТАВТЕ СВІЙ АНОНІМНИЙ КЛЮЧ З SUPABASE СЮДИ:
    const SUPABASE_ANON_KEY = "ВСТАВТЕ_СЮДИ_ВАШ_КЛЮЧ_ANON_PUBLIC"; 

    const CURRENT_PD = "ПД-13";
    const TEMPORARY_PASSWORD = "1234"; // Тестовий пароль для входу

    let supabase = null;
    let globalTracks = [];

    // Елементи інтерфейсу
    const logsContainer = document.getElementById('monitorLogs');
    const authCard = document.getElementById('authCard');
    const cabinetCard = document.getElementById('cabinetCard');
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('access_password');
    const peregonSelect = document.getElementById('peregon');
    const trackSelect = document.getElementById('track_type');
    const workDateInput = document.getElementById('work_date');
    const kmHeaderBtn = document.getElementById('kmHeaderBtn');
    const kmListContainer = document.getElementById('kmListContainer');
    const selectedCountSpan = document.getElementById('selectedCount');
    const submitBtn = document.getElementById('submitBtn');

    // Логування (працює миттєво)
    function logMessage(text, type = 'info') {
        if (!logsContainer) return;
        const time = new Date().toLocaleTimeString();
        let className = 'log-info';
        if (type === 'success') className = 'log-success';
        if (type === 'error') className = 'log-error';

        const line = document.createElement('div');
        line.className = `log-line ${className}`;
        line.innerText = `[${time}]: ${text}`;
        logsContainer.appendChild(line);
        logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    // Встановлення сьогоднішньої дати
    if (workDateInput) {
        workDateInput.value = new Date().toISOString().split('T')[0];
    }

    // Автоматичний старт та синхронізація конфігурації перегонів
    async function initSystem() {
        logMessage(`Синхронізація хмари для ${CURRENT_PD}...`, 'info');
        
        try {
            if (typeof Supabase === 'undefined') {
                throw new Error("Бібліотека Supabase JS не завантажилась. Перевірте підключення до мережі.");
            }

            if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("ВСТАВТЕ_СЮДИ")) {
                throw new Error("Критична помилка: Не вказано реальний SUPABASE_ANON_KEY у коді скрипту!");
            }

            // Ініціалізуємо підключення
            supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Викачуємо лінії ліній_config тільки для нашого ПД-13
            const { data, error } = await supabase
                .from('lines_config')
                .select('*')
                .eq('pd', CURRENT_PD);

            if (error) throw error;

            // Гарантуємо, що globalTracks — це чистий масив
            globalTracks = data || [];

            if (globalTracks.length === 0) {
                logMessage(`Попередження: Для ${CURRENT_PD} не знайдено записів у lines_config!`, 'error');
                peregonSelect.innerHTML = '<option value="" disabled>Дані відсутні</option>';
                return;
            }

            logMessage("Синхронізацію ліній виконано успішно", 'success');
            buildPeregonDropdown();

        } catch (err) {
            logMessage(`Помилка зв'язку: ${err.message}`, 'error');
            peregonSelect.innerHTML = '<option value="" disabled>Помилка завантаження</option>';
        }
    }

    // Обробка логіну
    loginBtn.addEventListener('click', () => {
        if (passwordInput.value === TEMPORARY_PASSWORD) {
            logMessage("Вхід виконано успішно", "success");
            authCard.style.display = 'none';
            cabinetCard.style.display = 'block';
            document.getElementById('pd-title').innerText = CURRENT_PD;
        } else {
            logMessage("Помилка входу: Невірний пароль доступу!", "error");
            alert("Невірний пароль!");
        }
    });

    // Побудова унікального списку перегонів (береться поле .name)
    function buildPeregonDropdown() {
        const uniquePeregons = [...new Set(globalTracks.map(track => track.name))];
        
        peregonSelect.innerHTML = '<option value="" disabled selected>Оберіть ділянку...</option>';
        uniquePeregons.forEach(name => {
            if (name) {
                peregonSelect.innerHTML += `<option value="${name}">${name}</option>`;
            }
        });
    }

    // Зміна перегону -> завантаження відповідних колій
    peregonSelect.addEventListener('change', (e) => {
        const selectedPeregonName = e.target.value;
        const filteredTracks = globalTracks.filter(t => t.name === selectedPeregonName);

        trackSelect.innerHTML = '<option value="" disabled selected>Оберіть колію...</option>';
        filteredTracks.forEach(track => {
            if (track.track_type) {
                trackSelect.innerHTML += `<option value="${track.track_type}">${track.track_type}</option>`;
            }
        });

        trackSelect.disabled = false;
        resetKmList();
    });

    // Зміна колії -> генерація кілометрів відповідно до start_km та end_km з бази даних
    trackSelect.addEventListener('change', () => {
        const selectedPeregon = peregonSelect.value;
        const selectedTrackType = trackSelect.value;

        const config = globalTracks.find(t => t.name === selectedPeregon && t.track_type === selectedTrackType);

        if (config) {
            const start = config.start_km || 1;
            const end = config.end_km || (start + 10);
            
            generateKmCheckboxes(start, end);
            logMessage(`Завантажено кілометри для: ${selectedPeregon} (${selectedTrackType} колія)`, 'info');
        }
    });

    // Генерація чекбоксів кілометрів
    function generateKmCheckboxes(start, end) {
        kmListContainer.innerHTML = '';
        for (let i = start; i <= end; i++) {
            const label = document.createElement('label');
            label.className = 'km-item';
            label.innerHTML = `<input type="checkbox" class="km-checkbox" value="${i}"> км ${i}`;
            kmListContainer.appendChild(label);
        }

        document.querySelectorAll('.km-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('.km-checkbox:checked').length;
                selectedCountSpan.innerText = `обрано: ${checkedCount}`;
            });
        });
    }

    function resetKmList() {
        kmListContainer.innerHTML = '';
        selectedCountSpan.innerText = 'обрано: 0';
    }

    // Відкриття/закриття випадаючого списку кілометрів
    kmHeaderBtn.addEventListener('click', () => {
        const isOpened = kmListContainer.style.display === 'grid';
        kmListContainer.style.display = isOpened ? 'none' : 'grid';
    });

    // Відправка та збереження даних (UPSERT по 10 пікетів на кожен кілометр)
    submitBtn.addEventListener('click', async () => {
        const peregon = peregonSelect.value;
        const trackType = trackSelect.value;
        const date = workDateInput.value;
        const selectedKms = Array.from(document.querySelectorAll('.km-checkbox:checked')).map(cb => parseInt(cb.value));

        if (!peregon || !trackType) {
            logMessage("Помилка збереження: не вказано ділянку або колію", "error");
            alert("Будь ласка, оберіть перегін та колію!");
            return;
        }

        if (selectedKms.length === 0) {
            logMessage("Помилка збереження: не вибрано жодного кілометра для косіння", "error");
            alert("Оберіть хоча б один кілометр!");
            return;
        }

        logMessage(`Запуск збереження даних для ${peregon}...`, 'info');

        // Генеруємо масив рядків для бази даних (всі 10 пікетів для кожного обраного км)
        const finalRows = [];
        selectedKms.forEach(km => {
            for (let p = 1; p <= 10; p++) {
                finalRows.push({
                    pd: CURRENT_PD,
                    peregon: peregon,
                    track_type: trackType,
                    km: km,
                    piket: p,
                    status: 'green', // зелений колір означає успішно виконане косіння
                    date: date
                });
            }
        });

        try {
            // Використовуємо .upsert з вказанням унікальних колонок, щоб перезаписувати старі записи новими датами
            const { error } = await supabase
                .from('mowing')
                .upsert(finalRows, { onConflict: 'peregon,track_type,km,piket' });

            if (error) throw error;

            logMessage(`Успішно оновлено ${selectedKms.length} км (${finalRows.length} пікетів).`, 'success');
            alert("Дані успішно внесено до бази даних!");

        } catch (err) {
            logMessage(`Помилка запису в Supabase Mowing: ${err.message}`, 'error');
            alert("Не вдалося виконати збереження в базу.");
        }
    });

    // Старт системи одразу після завантаження сторінки
    window.addEventListener('DOMContentLoaded', initSystem);
</script>

</body>
</html>
