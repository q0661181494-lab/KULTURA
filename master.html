<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #008b74;
            --primary-hover: #006e5c;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            --color-red: #ef4444;
            --color-yellow: #eab308;
            --color-green: #22c55e;
            --accent-checkbox: #008b74;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .nav-btn { flex: 1; background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .card { background: var(--card-bg); border-radius: 16px; padding: 25px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 800; font-size: 12px; margin-bottom: 8px; color: var(--primary-color); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--primary-color); border-radius: 10px; font-size: 15px; outline: none; }
        
        /* Розгортаючий список */
        details { border: 1px solid var(--primary-color); border-radius: 10px; padding: 10px; background: #f8fafc; margin-bottom: 10px; }
        summary { cursor: pointer; font-weight: bold; color: var(--primary-color); padding: 5px; outline: none; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); }
        input[type="checkbox"] { accent-color: var(--accent-checkbox); transform: scale(1.2); }

        .btn-submit { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Монітор */
        .monitor { width: 100%; max-width: 600px; background: #1e293b; color: #f8fafc; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 12px; margin-top: 10px; }
        .log-msg-error { color: #f87171; }
        .log-msg-success { color: #4ade80; }
        
        .hidden { display: none !important; }
        .piket { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: #e2e8f0; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .status-active { background: #1d4ed8; color: white; }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="nav-btn active">🚪 Кабінет ПД</button>
    </div>

    <div id="login-card" class="card">
        <div class="card-title">🧑‍🔧 Вхід для ПД</div>
        <div class="form-group">
            <label>ПАРОЛЬ:</label>
            <input type="password" id="password-input" class="form-control" placeholder="••••" value="" autocomplete="off">
        </div>
        <button class="btn-submit" id="login-submit-btn" onclick="executeLogin()">Увійти</button>
    </div>

    <div id="cabinet-card" class="card hidden">
        <div class="card-title">Налаштування робіт</div>
        
        <form id="mowing-form" onsubmit="handleFormSubmit(event)">
            <details>
                <summary>Оберіть перегони</summary>
                <div id="peregon-container" class="checkbox-group"></div>
            </details>

            <details>
                <summary>Оберіть колії</summary>
                <div id="track-container" class="checkbox-group"></div>
            </details>

            <div class="form-group">
                <label>РУЧНИЙ ВВІД КМ (через кому):</label>
                <input type="text" id="manual-km-input" class="form-control" placeholder="Наприклад: 12, 14, 25">
            </div>

            <button type="submit" class="btn-submit">Побудувати діаграму</button>
        </form>
    </div>

    <div class="monitor">
        <div style="font-weight:bold; margin-bottom:5px;">💻 СИСТЕМНИЙ МОНІТОР</div>
        <div id="monitor-logs"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        let supabaseClient, linesConfigList = [];

        function log(text, type = 'info') {
            const el = document.getElementById('monitor-logs');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'log-msg-error' : (type === 'success' ? 'log-msg-success' : '');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
            el.prepend(div);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            log("Система ініціалізована...", "info");
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log("Підключення до Supabase успішне", "success");
            } catch (e) {
                log("Помилка ініціалізації: " + e.message, "error");
            }
        });

        async function executeLogin() {
            const pass = document.getElementById('password-input').value.trim();
            if (!/^\d{4}$/.test(pass)) {
                log("Помилка: Пароль має бути 4 цифри", "error");
                return;
            }
            
            // Очищення паролю
            document.getElementById('password-input').value = "";
            
            const pd = `ПД-${pass.slice(0, 2)}`;
            log(`Спроба входу для ${pd}...`);

            const { data, error } = await supabaseClient.from('lines_config').select('*').eq('pd', pd);
            if (error) { log("Помилка БД: " + error.message, "error"); return; }
            
            linesConfigList = data;
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('cabinet-card').classList.remove('hidden');
            
            renderSelections();
        }

        function renderSelections() {
            const pContainer = document.getElementById('peregon-container');
            const tContainer = document.getElementById('track-container');
            
            const peregons = [...new Set(linesConfigList.map(i => i.name))];
            const tracks = [...new Set(linesConfigList.map(i => i.track_type))];

            pContainer.innerHTML = peregons.map(p => `<label><input type="checkbox" value="${p}"> ${p}</label>`).join('');
            tContainer.innerHTML = tracks.map(t => `<label><input type="checkbox" value="${t}"> ${t}</label>`).join('');
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const selectedPeregons = Array.from(document.querySelectorAll('#peregon-container input:checked')).map(i => i.value);
            const manualKmStr = document.getElementById('manual-km-input').value;
            const manualKm = manualKmStr.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));

            if (selectedPeregons.length === 0 || manualKm.length === 0) {
                log("Помилка: Оберіть перегін та введіть КМ", "error");
                return;
            }
            log(`Побудова діаграми для КМ: ${manualKm.join(', ')}`, "success");
            // Тут подальша логіка...
        }
    </script>
</body>
</html>
