<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #008b74;
            --primary-hover: #006e5c;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            
            /* Інформаційний синій колір для меж станцій */
            --station-color: #2563eb;
            
            --color-red: #ef4444;    /* > 45 днів */
            --color-yellow: #eab308; /* 30-45 днів */
            --color-green: #22c55e;  /* < 30 днів */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        html, body { height: 100%; background-color: var(--bg-color); }
        
        body { color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; position: relative; }

        .main-content { flex: 1 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px 12px 110px 12px; }
        
        .nav-menu { background: white; border-radius: 12px; padding: 6px; margin-bottom: 12px; display: flex; gap: 6px; box-shadow: 0 4px 10px rgba(11, 94, 89, 0.06); width: 100%; max-width: 580px; align-items: center; border: 1px solid #d1fae5; }
        .nav-link { flex: 1; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #115e59; text-decoration: none; border-radius: 8px; background: #f0fdf4; cursor: pointer; border: none; }
        .admin-menu-btn { width: 42px; height: 42px; background-color: #f0fdf4; color: #115e59; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: none; flex-shrink: 0; text-decoration: none; cursor: pointer; }
        .nav-link:hover, .admin-menu-btn:hover { background-color: #e6f4ea; }
        .nav-link.active, .admin-menu-btn.active { background-color: #115e59 !important; color: white !important; pointer-events: none; }

        .screen { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(11, 94, 89, 0.05); width: 100%; max-width: 580px; margin-bottom: 24px; border: 1px solid #d1fae5; }
        .screen.welcome-focus { margin-top: 10px; transform: scale(1.02); box-shadow: 0 20px 40px rgba(11, 94, 89, 0.12); border-color: #a7f3d0; padding: 30px 20px; }

        .card-title { font-size: 18px; font-weight: 800; color: #115e59; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1.8px; text-align: center; }
        .card-subtitle { color: #0f766e; font-size: 13px; margin-bottom: 16px; text-align: center; opacity: 0.8; }
        
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 700; font-size: 11px; margin-bottom: 4px; color: #115e59; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 11px; border: 1px solid #a7f3d0; border-radius: 10px; font-size: 14px; outline: none; background: #fff; color: #115e59; font-weight: 500; }
        .form-control:focus { border-color: #0d9488; box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2); }
        .secure-numeric-input { -webkit-text-security: disc !important; text-security: disc !important; }
        
        .btn-submit { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: background 0.2s; }
        .btn-submit:hover { background: var(--primary-hover); }

        .railway-canvas { display: flex; flex-direction: column; width: 100%; margin-top: 12px; }
        .km-signboard { background: #e6f4ea; border: 2px solid #115e59; border-radius: 8px; padding: 8px; margin: 18px 0 8px 0; text-align: center; font-weight: 900; font-size: 14px; color: #115e59; letter-spacing: 1px; text-transform: uppercase; }
        
        .track-headers-row { display: flex; width: 100%; margin-bottom: 6px; font-size: 11px; font-weight: 800; color: #0f766e; text-transform: uppercase; text-align: center; opacity: 0.8; }
        .header-margin-space { width: 50px; }
        .header-left-track { flex: 1; padding-right: 16px; }
        .header-center-space { width: 42px; }
        .header-right-track { flex: 1; padding-left: 16px; }

        .piket-rail-node { display: flex; align-items: center; margin-bottom: 5px; height: 44px; position: relative; border-radius: 6px; }
        
        .info-margin { width: 50px; height: 100%; display: flex; align-items: center; font-size: 10px; font-weight: bold; color: #0f766e; box-sizing: border-box; transition: background-color 0.2s; }
        .margin-left { justify-content: flex-end; padding-right: 4px; }
        .margin-right { justify-content: flex-start; padding-left: 4px; }

        /* СИНІ СТИЛІ ДЛЯ МЕЖ СТАНЦІЙ НА БОКОВИХ ПОЛЯХ */
        .station-bracket-left { background-color: rgba(37, 99, 235, 0.08) !important; border-left: 4px solid var(--station-color) !important; border-radius: 6px 0 0 6px; }
        .station-bracket-right { background-color: rgba(37, 99, 235, 0.08) !important; border-right: 4px solid var(--station-color) !important; border-radius: 0 6px 6px 0; }

        .signal-badge { display: inline-flex; align-items: center; justify-content: center; background: #1e293b; color: #ffffff; padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 800; border: 1px solid #475569; min-width: 42px; box-sizing: border-box; z-index: 5; }
        .signal-badge::before { content: ""; display: inline-block; width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; margin-right: 4px; box-shadow: 0 0 6px #22c55e; }

        .mowing-bank-zone { flex: 1; height: 100%; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.04); padding: 0 4px; text-align: center; line-height: 1.2; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); background-color: #fff; cursor: pointer; transition: background-color 0.15s, transform 0.1s; user-select: none; }
        .mowing-bank-zone:active { transform: scale(0.96); }

        .inactive-bank { opacity: 0.65; cursor: not-allowed !important; filter: grayscale(15%); pointer-events: none; border: 1px dashed #94a3b8; }

        .piket-center-core { width: 42px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #115e59; background: #e6f4ea; border-radius: 5px; margin: 0 6px; z-index: 2; border: 1px solid #a7f3d0; box-sizing: border-box; }
        
        .rail-line-visual { width: 12px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: #cbd5e1; }
        .rail-line-visual::before, .rail-line-visual::after { content: ""; position: absolute; top: 0; width: 2px; height: 100%; background: #475569; }
        .rail-line-visual::before { left: 1px; }
        .rail-line-visual::after { right: 1px; }
        .rail-line-visual span { display: block; width: 100%; height: 3px; background: #64748b; margin: 2px 0; }

        .status-clear-green { background-color: #22c55e !important; color: white !important; }
        .status-warn-yellow { background-color: #eab308 !important; color: #1f2937 !important; }
        .status-overgrown-red { background-color: #ef4444 !important; color: white !important; }
        .status-unknown { background-color: #f1f5f9 !important; color: #64748b !important; border: 1px dashed #cbd5e1; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 1px solid #fee2e2; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; background: #fff5f5; padding: 12px; border-radius: 10px; border: 1px dashed #fca5a5; margin-bottom: 16px; cursor: pointer; user-select: none; color: #991b1b; font-weight: 600; font-size: 14px; }
        .checkbox-container input { width: 18px; height: 18px; accent-color: #dc2626; cursor: pointer; }

        .debug-panel { flex-shrink: 0; width: 100%; max-width: 580px; position: fixed; bottom: -210px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 10px; background-color: rgba(230, 244, 234, 0.98); backdrop-filter: blur(6px); border: 1px solid #c2e7d9; color: #115e59; border-radius: 12px 12px 0 0; font-size: 11px; font-family: monospace; box-shadow: 0 -4px 20px rgba(11,94,89,0.15); box-sizing: border-box; transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .debug-panel.active { bottom: 0px; }
        @media (max-width: 600px) { .debug-panel { width: calc(100% - 20px); } }
        .debug-title { font-weight: bold; color: #0f766e; margin-bottom: 4px; border-bottom: 1px solid #c2e7d9; padding-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .debug-scroll { max-height: 60px; overflow-y: auto; text-align: left; }
        .debug-toggle-btn { position: fixed; bottom: 4px; left: 4px; width: 26px; height: 26px; background: rgba(148, 163, 184, 0.12); color: #475569; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; z-index: 9998; display: flex; align-items: center; justify-content: center; user-select: none; transition: background 0.2s, opacity 0.2s; opacity: 0.6; }
        .debug-toggle-btn:hover { background: rgba(148, 163, 184, 0.35); opacity: 1; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="nav-menu">
            <a href="index.html" class="nav-link">📊 Графіки</a>
            <button class="nav-link active">🚪 Кабінет ПД</button>
            <a href="admin.html" class="admin-menu-btn">⚙️</a>
        </div>

        <div id="login-card" class="screen welcome-focus">
            <div class="card-title">Вхід для ПД</div>
            <div class="card-subtitle">Введіть пароль вашого околотка для переходу до графіка.</div>
            <div class="form-group">
                <input type="tel" id="password-input" class="form-control secure-numeric-input" style="text-align:center; font-size:20px; letter-spacing:4px;" maxlength="4" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            </div>
            <button class="btn-submit" onclick="executeLogin()">Увійти в кабінет</button>
        </div>

        <div id="cabinet-card" class="screen hidden">
            <div class="card-title" id="cabinet-header-title">Кабінет ПД</div>
            <div class="card-subtitle">Ваші колії активні для редагування. Колії сусідів доступні для перегляду.</div>
            
            <div class="form-group">
                <label>Дата виконання робіт:</label>
                <input type="date" id="work-date-input" class="form-control">
            </div>

            <div class="form-group">
                <label>Фільтр КМ (ручний ввід через кому / порожньо - весь околоток):</label>
                <input type="text" id="manual-km-input" class="form-control" placeholder="Наприклад: 69, 70" oninput="filterDiagramByKm()">
            </div>

            <div id="diagram-render-zone" class="railway-canvas"></div>
            
            <button class="btn-submit" onclick="saveMowingProgress()">Синхронізувати з хмарою</button>
            <button class="btn-submit" onclick="toggleClearModal(true)" style="background: transparent; border: 2px solid #ef4444; color: #ef4444; margin-top: 12px; box-shadow: none;">🗑️ Очистити інформацію</button>
        </div>
    </div>

    <div id="clear-data-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="card-title" style="color: #dc2626; font-size: 16px; margin-bottom: 12px;">🗑️ Видалення даних</div>
            <label class="checkbox-container">
                <input type="checkbox" id="clear-all-pd-checkbox" onchange="handleClearCheckboxChange()">
                Очистити ВЕСЬ околоток
            </label>
            <div class="form-group" id="clear-km-group">
                <label style="color: #dc2626;">Або введіть номер кілометра:</label>
                <input type="number" id="clear-km-input" class="form-control" style="border-color: #fca5a5;" placeholder="Наприклад: 69">
            </div>
            <button class="btn-submit" onclick="executeDataClear()" style="background: #dc2626; margin-top: 8px;">Підтвердити видалення</button>
            <button class="btn-submit" onclick="toggleClearModal(false)" style="background: #94a3b8; margin-top: 8px;">Скасувати</button>
        </div>
    </div>

    <button class="debug-toggle-btn" onclick="toggleDebugPanel()">🛠️</button>

    <div class="debug-panel" id="system-debug-panel">
        <div class="debug-title" style="display: flex; justify-content: space-between; align-items: center;">
            <span>🖥️ Монітор системи</span>
            <span onclick="toggleDebugPanel()" style="cursor:pointer; padding: 0 4px; font-weight: bold; color: #dc2626;">[Сховати]</span>
        </div>
        <div id="debug-console" class="debug-scroll"></div>
    </div>

    <script>
        const fullKey = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        const baseDbUrl = "https://zcyntywoftcahfjwqldr.supabase.co";
        let supabaseClient;

        let globalTracksData = []; 
        let globalMowingData = [];
        let signalsData = [];
        let currentPD = "";
        let selectedPiketsToSave = []; 

        document.getElementById('work-date-input').valueAsDate = new Date();

        function logSys(text, status = 'info') {
            const con = document.getElementById('debug-console');
            if(!con) return;
            const div = document.createElement('div');
            if(status === 'success') div.style.color = '#16a34a';
            if(status === 'error') div.style.color = '#dc2626';
            div.innerText = "[" + new Date().toLocaleTimeString() + "]: " + text;
            con.prepend(div);
        }

        function toggleDebugPanel() {
            document.getElementById('system-debug-panel').classList.toggle('active');
        }

        window.addEventListener('DOMContentLoaded', async () => {
            logSys("Система ініціалізована...", "info");
            try {
                supabaseClient = window.supabase.createClient(baseDbUrl, fullKey);
                logSys("Зв'язок із хмарою встановлено.", "success");
            } catch (e) {
                logSys("Помилка підключення: " + e.message, "error");
            }
        });

        async function executeLogin() {
            const passInput = document.getElementById('password-input');
            const pass = passInput.value.trim();
            if (!/^\d{4}$/.test(pass) || pass.slice(0, 2) !== pass.slice(2, 4)) {
                logSys("Помилка: Невірний формат паролю!", "error");
                return;
            }

            currentPD = `ПД-${pass.slice(0, 2)}`;
            passInput.value = ""; 
            
            logSys(`Авторизація: ${currentPD}... Завантаження всієї ділянки...`, "info");
            document.getElementById('cabinet-header-title').innerText = `Кабінет: ${currentPD}`;

            const headers = { 'apikey': fullKey, 'authorization': 'Bearer ' + fullKey };
            try {
                const resTracks = await fetch(`${baseDbUrl}/rest/v1/lines_config`, { headers });
                globalTracksData = await resTracks.json();

                const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing`, { headers });
                globalMowingData = await resMowing.json();

                const resSignals = await fetch(`${baseDbUrl}/rest/v1/signals`, { headers });
                signalsData = await resSignals.json();

                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('cabinet-card').classList.remove('hidden');
                
                logSys("Дані успішно синхронізовано. Будуємо діаграму...", "success");
                buildMasterDiagram();
            } catch (e) {
                logSys("Помилка завантаження даних: " + e.message, "error");
            }
        }

        function cleanPd(pdStr) {
            return pdStr ? pdStr.trim().toUpperCase() : "";
        }

        function sanitizeString(str) {
            if (!str) return '';
            let s = str.toLowerCase().replace(/\s+/g, '');
            const map = {'e':'е', 'a':'а', 'o':'о', 'p':'р', 'c':'с', 'x':'х', 'i':'і', 'y':'у'};
            return s.split('').map(c => map[c] || c).join('');
        }
        
        function isLeftTrack(str) {
            let s = sanitizeString(str);
            return s.includes('парна') && !s.includes('непарна');
        }
        
        function isRightTrack(str) {
            let s = sanitizeString(str);
            return s.includes('непарна');
        }

        function getPiketAnalysis(targetTrackType, km, pk, ownerPd) {
            if (!ownerPd) return { colorClass: 'status-unknown', label: 'Немає даних', days: '' };

            const record = globalMowingData.find(m => 
                cleanPd(m.pd) === cleanPd(ownerPd) && 
                parseInt(m.km) === km && 
                parseInt(m.piket) === pk &&
                (targetTrackType === 'парна' ? isLeftTrack(m.track_type) : isRightTrack(m.track_type))
            );
            
            if (!record || record.status !== 'green') return { colorClass: 'status-overgrown-red', label: 'Не обкошено', days: '—' };
            if (!record.date) return { colorClass: 'status-clear-green', label: 'Обкошено', days: '0 дн.' };

            const diffDays = Math.ceil(Math.abs(new Date() - new Date(record.date)) / (1000 * 60 * 60 * 24));
            if (diffDays >= 45) return { colorClass: 'status-overgrown-red', label: 'Критично', days: `${diffDays} дн.` };
            if (diffDays >= 30) return { colorClass: 'status-warn-yellow', label: 'Увага', days: `${diffDays} дн.` };
            return { colorClass: 'status-clear-green', label: 'Обкошено', days: `${diffDays} дн.` };
        }

        function buildMasterDiagram(allowedKm = null) {
            const container = document.getElementById('diagram-render-zone');
            container.innerHTML = "";

            const myConfigs = globalTracksData.filter(t => cleanPd(t.pd) === currentPD);
            
            if (myConfigs.length === 0) {
                container.innerHTML = `<p style='color:red; text-align:center;'>Для ${currentPD} не знайдено закріплених кілометрів.</p>`;
                return;
            }

            let minKm = Math.min(...myConfigs.map(s => parseInt(s.start_km)));
            let maxKm = Math.max(...myConfigs.map(s => parseInt(s.end_km)));

            for (let km = minKm; km <= maxKm; km++) {
                if (allowedKm && !allowedKm.includes(km)) continue;

                const kmSign = document.createElement('div');
                kmSign.className = 'km-signboard';
                kmSign.innerText = `Кілометр ${km}`;
                container.appendChild(kmSign);

                const headersRow = document.createElement('div');
                headersRow.className = 'track-headers-row';
                headersRow.innerHTML = `<div class="header-margin-space"></div><div class="header-left-track">ПАРНА</div><div class="header-center-space"></div><div class="header-right-track">НЕПАРНА</div><div class="header-margin-space"></div>`;
                container.appendChild(headersRow);

                for (let pk = 1; pk <= 10; pk++) {
                    
                    let configsForPk = globalTracksData.filter(s => {
                        let sKm = parseInt(s.start_km);
                        let eKm = parseInt(s.end_km);
                        let sPk = parseInt(s.start_pk); sPk = isNaN(sPk) ? 1 : sPk;
                        let ePk = parseInt(s.end_pk); ePk = isNaN(ePk) ? 10 : ePk;
                        
                        if (km < sKm || km > eKm) return false;
                        if (km === sKm && pk < sPk) return false;
                        if (km === eKm && pk > ePk) return false;
                        return true;
                    });

                    let leftConfigs = configsForPk.filter(s => sanitizeString(s.type) !== 'станція' && isLeftTrack(s.track_type));
                    let rightConfigs = configsForPk.filter(s => sanitizeString(s.type) !== 'станція' && isRightTrack(s.track_type));
                    
                    let leftStationConfigs = configsForPk.filter(s => sanitizeString(s.type) === 'станція' && (isLeftTrack(s.track_type) || !s.track_type || s.track_type.trim() === ''));
                    let rightStationConfigs = configsForPk.filter(s => sanitizeString(s.type) === 'станція' && (isRightTrack(s.track_type) || !s.track_type || s.track_type.trim() === ''));

                    let leftConfig = leftConfigs.find(s => cleanPd(s.pd) === currentPD) || leftConfigs[0];
                    let rightConfig = rightConfigs.find(s => cleanPd(s.pd) === currentPD) || rightConfigs[0];
                    
                    let leftStationConfig = leftStationConfigs.find(s => cleanPd(s.pd) === currentPD) || leftStationConfigs[0];
                    let rightStationConfig = rightStationConfigs.find(s => cleanPd(s.pd) === currentPD) || rightStationConfigs[0];

                    let finalLeftConfig = leftStationConfig || leftConfig;
                    let finalRightConfig = rightStationConfig || rightConfig;

                    let finalLeftName = finalLeftConfig ? finalLeftConfig.name : "Невідомо";
                    let finalRightName = finalRightConfig ? finalRightConfig.name : "Невідомо";
                    
                    let leftOwnerPd = finalLeftConfig ? finalLeftConfig.pd : null;
                    let rightOwnerPd = finalRightConfig ? finalRightConfig.pd : null;

                    let isLeftMine = cleanPd(leftOwnerPd) === currentPD;
                    let isRightMine = cleanPd(rightOwnerPd) === currentPD;
                    
                    let isLeftStation = !!leftStationConfig;
                    let isRightStation = !!rightStationConfig;

                    const leftSide = getPiketAnalysis('парна', km, pk, leftOwnerPd);
                    const rightSide = getPiketAnalysis('непарна', km, pk, rightOwnerPd);

                    const nodeRow = document.createElement('div');
                    nodeRow.className = 'piket-rail-node';

                    // ================= ЛІВЕ БОКОВЕ ПОЛЕ (СИГНАЛИ + СТАНЦІЯ СИНІЙ) =================
                    const leftMargin = document.createElement('div');
                    leftMargin.className = `info-margin margin-left ${isLeftStation ? 'station-bracket-left' : ''}`;
                    const leftSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && isLeftTrack(s.track_type));
                    if (leftSignal) leftMargin.innerHTML = `<span class="signal-badge">${leftSignal.signal_name}</span>`;
                    nodeRow.appendChild(leftMargin);

                    // ================= БРІВКА ПАРНА (ЛІВА) =================
                    const leftBank = document.createElement('div');
                    leftBank.className = `mowing-bank-zone ${leftSide.colorClass}`;
                    
                    if (isLeftMine) {
                        leftBank.innerHTML = `<div>${leftSide.label}</div><div style="font-size:9px; opacity:0.85;">${leftSide.days}</div>`;
                        leftBank.dataset.initialClass = leftSide.colorClass;
                        leftBank.onclick = () => togglePiketSelection(leftBank, finalLeftName, 'парна', km, pk);
                    } else {
                        leftBank.classList.add('inactive-bank');
                        let ownerLabel = leftOwnerPd ? `(${leftOwnerPd})` : '';
                        leftBank.innerHTML = `<div>${leftSide.label}</div><div style="font-size:9px; font-weight: bold; margin-top:2px; color: #334155;">${leftSide.days} ${ownerLabel}</div>`;
                    }
                    nodeRow.appendChild(leftBank);

                    const leftTrack = document.createElement('div');
                    leftTrack.className = 'rail-line-visual';
                    leftTrack.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(leftTrack);

                    const centerPiket = document.createElement('div');
                    centerPiket.className = 'piket-center-core';
                    centerPiket.innerText = pk;
                    nodeRow.appendChild(centerPiket);

                    const rightTrack = document.createElement('div');
                    rightTrack.className = 'rail-line-visual';
                    rightTrack.innerHTML = '<span></span><span></span><span></span><span></span>';
                    nodeRow.appendChild(rightTrack);

                    // ================= БРІВКА НЕПАРНА (ПРАВА) =================
                    const rightBank = document.createElement('div');
                    rightBank.className = `mowing-bank-zone ${rightSide.colorClass}`;
                    
                    if (isRightMine) {
                        rightBank.innerHTML = `<div>${rightSide.label}</div><div style="font-size:9px; opacity:0.85;">${rightSide.days}</div>`;
                        rightBank.dataset.initialClass = rightSide.colorClass;
                        rightBank.onclick = () => togglePiketSelection(rightBank, finalRightName, 'непарна', km, pk);
                    } else {
                        rightBank.classList.add('inactive-bank');
                        let ownerLabel = rightOwnerPd ? `(${rightOwnerPd})` : '';
                        rightBank.innerHTML = `<div>${rightSide.label}</div><div style="font-size:9px; font-weight: bold; margin-top:2px; color: #334155;">${rightSide.days} ${ownerLabel}</div>`;
                    }
                    nodeRow.appendChild(rightBank);

                    // ================= ПРАВЕ БОКОВЕ ПОЛЕ (СИГНАЛИ + СТАНЦІЯ СИНІЙ) =================
                    const rightMargin = document.createElement('div');
                    rightMargin.className = `info-margin margin-right ${isRightStation ? 'station-bracket-right' : ''}`;
                    const rightSignal = signalsData.find(s => parseInt(s.km) === km && parseInt(s.piket) === pk && isRightTrack(s.track_type));
                    if (rightSignal) rightMargin.innerHTML = `<span class="signal-badge">${rightSignal.signal_name}</span>`;
                    nodeRow.appendChild(rightMargin);

                    container.appendChild(nodeRow);
                }
            }
        }

        function filterDiagramByKm() {
            const inputVal = document.getElementById('manual-km-input').value.trim();
            if (!inputVal) {
                buildMasterDiagram();
                return;
            }
            const allowed = inputVal.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            buildMasterDiagram(allowed);
        }

        function togglePiketSelection(element, peregonName, trackType, km, piket) {
            const isSelected = element.classList.contains('status-clear-green') && !element.classList.contains(element.dataset.initialClass);
            
            if (isSelected) {
                element.className = `mowing-bank-zone ${element.dataset.initialClass}`;
                element.querySelector('div').innerText = element.dataset.initialClass === 'status-warn-yellow' ? 'Увага' : 'Не обкошено';
                selectedPiketsToSave = selectedPiketsToSave.filter(p => !(p.peregon === peregonName && p.track_type === trackType && p.km === km && p.piket === piket));
            } else {
                element.className = 'mowing-bank-zone status-clear-green';
                element.querySelector('div').innerText = 'Обкошено';
                selectedPiketsToSave.push({
                    pd: currentPD,
                    peregon: peregonName, 
                    track_type: trackType,
                    km: km,
                    piket: piket,
                    status: 'green'
                });
            }
            logSys(`Оновлень до збереження: ${selectedPiketsToSave.length}`, "info");
        }

        async function saveMowingProgress() {
            if (selectedPiketsToSave.length === 0) {
                alert("Ви не вибрали жодного пікета на діаграмі!");
                return;
            }

            const dateValue = document.getElementById('work-date-input').value;
            const recordsToSend = selectedPiketsToSave.map(p => ({
                ...p,
                date: dateValue
            }));

            logSys(`Збереження у хмару (${recordsToSend.length} записів)...`, "info");
            
            try {
                const { error } = await supabaseClient.from('mowing').upsert(recordsToSend);
                if (error) throw error;

                logSys("Синхронізація успішна!", "success");
                alert("Роботу успішно зафіксовано!");
                
                selectedPiketsToSave = [];
                const headers = { 'apikey': fullKey, 'authorization': 'Bearer ' + fullKey };
                const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing`, { headers });
                globalMowingData = await resMowing.json();
                
                filterDiagramByKm();
            } catch (e) {
                logSys("Помилка збереження: " + e.message, "error");
                alert("Помилка синхронізації: " + e.message);
            }
        }

        function toggleClearModal(show) {
            const modal = document.getElementById('clear-data-modal');
            if (show) {
                modal.classList.add('show');
                document.getElementById('clear-all-pd-checkbox').checked = false;
                const kmInput = document.getElementById('clear-km-input');
                kmInput.value = "";
                kmInput.disabled = false;
            } else {
                modal.classList.remove('show');
            }
        }

        function handleClearCheckboxChange() {
            const isChecked = document.getElementById('clear-all-pd-checkbox').checked;
            const kmInput = document.getElementById('clear-km-input');
            kmInput.disabled = isChecked;
            if (isChecked) kmInput.value = "";
        }

        async function executeDataClear() {
            const isClearAllPd = document.getElementById('clear-all-pd-checkbox').checked;
            const kmValue = document.getElementById('clear-km-input').value.trim();
            
            let url = `${baseDbUrl}/rest/v1/mowing?pd=eq.${encodeURIComponent(currentPD)}`;
            let confirmMessage = "";

            if (isClearAllPd) {
                confirmMessage = `Ви впевнені, що хочете ПОВНІСТЮ ОЧИСТИТИ ВСІ дані про обкошування для ${currentPD}?`;
            } else {
                if (!kmValue) return alert("Введіть номер кілометра або оберіть весь околоток!");
                const kmNum = parseInt(kmValue);
                if (isNaN(kmNum)) return alert("Помилка: номер кілометра має бути числом!");
                url += `&km=eq.${kmNum}`;
                confirmMessage = `Ви впевнені, що хочете видалити свої дані про обкошування на ${kmNum} км? (Дані сусідів не постраждають)`;
            }

            if (!confirm(confirmMessage)) return;

            toggleClearModal(false);
            logSys("Видалення даних...", "info");

            const headers = { 'apikey': fullKey, 'authorization': 'Bearer ' + fullKey, 'Content-Type': 'application/json' };

            try {
                const response = await fetch(url, { method: 'DELETE', headers: headers });
                if (response.ok) {
                    logSys("Дані успішно видалено!", "success");
                    alert("Ваші дані успішно очищено з хмари!");
                    selectedPiketsToSave = [];
                    const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing`, { headers });
                    globalMowingData = await resMowing.json();
                    filterDiagramByKm();
                } else {
                    throw new Error("Помилка сервера при операції DELETE");
                }
            } catch (e) {
                logSys("Помилка очищення: " + e.message, "error");
                alert("Не вдалося видалити дані: " + e.message);
            }
        }
    </script>
