<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #008b74;
            --primary-hover: #006e5c;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Навігація */
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .nav-btn { flex: 1; background: #fff; border: 1px solid var(--border-color); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .settings-btn { background: #fff; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; cursor: pointer; }

        /* Картки інтерфейсу */
        .card { background: var(--card-bg); border-radius: 16px; padding: 25px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid rgba(0, 139, 116, 0.1); margin-bottom: 20px; }
        .card-title { font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .card-subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

        /* Елементи форм */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 800; font-size: 12px; margin-bottom: 8px; color: var(--primary-color); letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--primary-color); border-radius: 10px; font-size: 15px; outline: none; background: #fff; color: var(--text-color); }
        
        .btn-submit { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: var(--primary-hover); }

        /* Випадаючий список кілометрів */
        .km-dropdown { border: 1px solid var(--primary-color); border-radius: 10px; padding: 12px; cursor: pointer; background: #f8fafc; }
        .km-dropdown-title { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; }
        .km-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .km-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; background: #fff; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-color); cursor: pointer; }

        /* Монітор самоаудиту */
        .monitor { width: 100%; max-width: 600px; background: #f8fafc; border-radius: 10px; padding: 15px; font-family: monospace; font-size: 12px; border: 1px solid var(--border-color); margin-top: 10px; }
        .monitor-title { font-weight: bold; color: #475569; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .monitor-logs { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .log-row { display: flex; gap: 8px; }
        .log-time { color: #94a3b8; }
        .log-msg-success { color: #16a34a; }
        .log-msg-error { color: #dc2626; }
        .log-msg-info { color: #2563eb; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="nav-btn">📊 Графіки</button>
        <button class="nav-btn active">🧑‍🔧 Майстер</button>
        <button class="settings-btn">⚙️</button>
    </div>

    <div id="login-card" class="card">
        <div class="card-title">🧑‍🔧 Вхід для ПД</div>
        <div class="card-subtitle">Внесіть дані про виконане обкошування на вашому околотку.</div>
        
        <div class="form-group">
            <label>ПАРОЛЬ ДОСТУПУ:</label>
            <input type="password" id="password-input" class="form-control" placeholder="••••" maxlength="4">
        </div>
        <button type="button" class="btn-submit" onclick="executeLogin()">Увійти в кабінет</button>
    </div>

    <div id="cabinet-card" class="card hidden">
        <div class="card-title">🧑‍🔧 Кабінет: <span id="pd-title-name">ПД-XX</span></div>
        <div class="card-subtitle">Оберіть ділянку, дату та відмітьте потрібні кілометри.</div>

        <form id="mowing-form" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label>ПЕРЕГІН:</label>
                <select id="peregon-select" class="form-control" onchange="syncTracksDropdown()" required>
                    <option value="">Оберіть перегін...</option>
                </select>
            </div>

            <div class="form-group">
                <label>КОЛІЯ:</label>
                <select id="track-select" class="form-control" onchange="generateKmCheckboxes()" required disabled>
                    <option value="">Спочатку оберіть перегін</option>
                </select>
            </div>

            <div class="form-group">
                <label>ДАТА ВИКОНАННЯ РОБІТ:</label>
                <input type="date" id="date-input" class="form-control" required>
            </div>

            <div class="form-group">
                <label>ВИБІР КІЛОМЕТРІВ:</label>
                <div class="km-dropdown">
                    <div class="km-dropdown-title" onclick="toggleKmView()">
                        <span>📂 Показати список кілометрів (<span id="km-count-label">обрано: 0</span>)</span>
                        <span>▼</span>
                    </div>
                    <div id="km-grid" class="km-grid hidden">
                        </div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Внести дані (відкрити діаграму)</button>
        </form>
    </div>

    <div class="monitor">
        <div class="monitor-title">💻 МОНІТОР САМОАУДИТУ СИСТЕМИ</div>
        <div id="monitor-logs" class="monitor-logs"></div>
    </div>

    <script>
        // Конфігурація підключення до Supabase
        const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        
        // Ініціалізація клієнта
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentPD = "";
        let linesConfigList = []; 
        let checkedKilometers = [];

        // Автоматичне виставлення сьогоднішньої дати
        document.getElementById('date-input').valueAsDate = new Date();

        // Функція виводу логів у монітор на екрані
        function logToMonitor(text, status = 'info') {
            const container = document.getElementById('monitor-logs');
            if (!container) return;
            const time = new Date().toLocaleTimeString();
            let styleClass = 'log-msg-info';
            
            if (status === 'success') styleClass = 'log-msg-success';
            if (status === 'error') styleClass = 'log-msg-error';

            const logItem = document.createElement('div');
            logItem.className = 'log-row';
            logItem.innerHTML = `<span class="log-time">[${time}]:</span> <span class="${styleClass}">${text}</span>`;
            
            container.appendChild(logItem);
            container.scrollTop = container.scrollHeight;
        }

        // Авторизація за маскою дублювання (1313, 1414...)
        async function executeLogin() {
            const inputPass = document.getElementById('password-input').value.trim();
            
            if (!/^\d{4}$/.test(inputPass) || inputPass.slice(0, 2) !== inputPass.slice(2, 4)) {
                logToMonitor("Помилка: Невірний формат паролю!", "error");
                return;
            }

            currentPD = `ПД-${inputPass.slice(0, 2)}`;
            logToMonitor(`Синхронізація хмари для ${currentPD}...`, "info");

            document.getElementById('pd-title-name').innerText = currentPD;
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('cabinet-card').classList.remove('hidden');

            await fetchActiveLines();
        }

        // Завантаження перегонів з бази lines_config за ідентифікатором ПД
        async function fetchActiveLines() {
            try {
                const { data, error } = await supabaseClient
                    .from('lines_config')
                    .select('*')
                    .eq('pd', currentPD);

                if (error) throw error;

                linesConfigList = data || [];
                
                if (linesConfigList.length === 0) {
                    logToMonitor(`Помилка: Для ${currentPD} не знайдено ділянок в lines_config`, "error");
                    return;
                }

                // Витягуємо унікальні назви з поля "name"
                const uniquePeregons = [...new Set(linesConfigList.map(item => item.name))];
                
                const selectElement = document.getElementById('peregon-select');
                selectElement.innerHTML = '<option value="">Оберіть перегін...</option>';
                
                uniquePeregons.forEach(peregonName => {
                    if(peregonName) {
                        selectElement.innerHTML += `<option value="${peregonName}">${peregonName}</option>`;
                    }
                });

                logToMonitor(`Знайдено ділянок: ${uniquePeregons.length}. Будуємо меню...`, "success");
                logToMonitor("Вхід виконано успішно", "success");

            } catch (err) {
                logToMonitor(`Помилка зв'язку: ${err.message || err}`, "error");
            }
        }

        // Оновлення списку колій при виборі конкретного перегону
        function syncTracksDropdown() {
            const selectedName = document.getElementById('peregon-select').value;
            const trackSelect = document.getElementById('track-select');
            
            document.getElementById('km-grid').innerHTML = "";
            updateKmBadge(0);

            if (!selectedName) {
                trackSelect.innerHTML = '<option value="">Спочатку оберіть перегін</option>';
                trackSelect.disabled = true;
                return;
            }

            const filteredTracks = linesConfigList.filter(item => item.name === selectedName);
            
            trackSelect.innerHTML = '<option value="">Оберіть колію...</option>';
            filteredTracks.forEach(item => {
                if(item.track_type) {
                    trackSelect.innerHTML += `<option value="${item.track_type}">${item.track_type}</option>`;
                }
            });

            trackSelect.disabled = false;
            logToMonitor(`Обрано перегін: ${selectedName}`, "info");
        }

        // Генерація списку чекбоксів кілометрів (від start_km до end_km)
        function generateKmCheckboxes() {
            const selectedName = document.getElementById('peregon-select').value;
            const selectedTrack = document.getElementById('track-select').value;
            const kmGrid = document.getElementById('km-grid');

            kmGrid.innerHTML = "";
            updateKmBadge(0);

            if (!selectedName || !selectedTrack) return;

            const config = linesConfigList.find(item => item.name === selectedName && item.track_type === selectedTrack);

            if (!config) {
                logToMonitor("Не вдалося знайти межі кілометражу для ділянки", "error");
                return;
            }

            const start = parseInt(config.start_km);
            const end = parseInt(config.end_km);

            logToMonitor(`Завантажено кілометри: з ${start} по ${end}`, "success");

            for (let km = start; km <= end; km++) {
                const itemLabel = document.createElement('label');
                itemLabel.className = 'km-item';
                itemLabel.innerHTML = `<input type="checkbox" value="${km}" onchange="recalculateCheckedKm()"> KM ${km}`;
                kmGrid.appendChild(itemLabel);
            }
        }

        function toggleKmView() {
            document.getElementById('km-grid').classList.toggle('hidden');
        }

        function recalculateCheckedKm() {
            const activeBoxes = document.querySelectorAll('#km-grid input[type="checkbox"]:checked');
            checkedKilometers = Array.from(activeBoxes).map(box => parseInt(box.value));
            updateKmBadge(checkedKilometers.length);
        }

        function updateKmBadge(count) {
            document.getElementById('km-count-label').innerText = `обрано: ${count}`;
        }

        // Відправка масиву відмічених кілометрів до таблиці mowing
        async function handleFormSubmit(event) {
            event.preventDefault();

            const peregonValue = document.getElementById('peregon-select').value;
            const trackValue = document.getElementById('track-select').value;

            if (checkedKilometers.length === 0) {
                logToMonitor("Помилка: Не обрано жодного кілометра!", "error");
                alert("Будь ласка, оберіть хоча б один кілометр зі списку.");
                return;
            }

            const dataToUpload = checkedKilometers.map(kmNum => ({
                pd: currentPD,
                peregon: peregonValue,
                track_type: trackValue,
                km: kmNum,
                piket: 1, 
                status: 'обкошено'
            }));

            try {
                const { error } = await supabaseClient
                    .from('mowing')
                    .upsert(dataToUpload);

                if (error) throw error;

                logToMonitor(`Дані успішно збережено в таблицю mowing! Записано км: ${checkedKilometers.join(', ')}`, "success");
                alert("Дані успішно внесено в журнал!");

            } catch (err) {
                logToMonitor(`Не вдалося виконати збереження: ${err.message || err}`, "error");
                alert(`Помилка під час відправки даних:\n${err.message || err}`);
            }
        }
    </script>
</body>
</html>
