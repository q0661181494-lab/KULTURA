<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #eef9f5;
            --card-bg: #ffffff;
            --primary-teal: #0b9484;
            --primary-hover: #0a7e70;
            --dark-teal: #0e6b5e;
            --text-muted: #666;
            --border-color: #ccc;
            --monitor-bg: #eefdf7;
            --monitor-border: #cbeedd;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        /* Навігаційні вкладки */
        .tabs-container {
            display: flex;
            background: white;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            align-items: center;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            color: #333;
            transition: all 0.2s;
        }

        .tab.active {
            background-color: var(--dark-teal);
            color: white;
        }

        .settings-btn {
            padding: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Головна картка кабінету */
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--dark-teal);
            margin-top: 0;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--primary-teal);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            color: var(--dark-teal);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-teal);
        }

        /* Вибір кілометрів (Аккордеон/Дропдаун) */
        .km-dropdown {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        .km-header {
            padding: 12px;
            background: #f9f9f9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .km-list {
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }

        .km-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Кнопка відправки */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* Монітор самоаудиту */
        .monitor {
            background-color: var(--monitor-bg);
            border: 1px solid var(--monitor-border);
            border-radius: 8px;
            padding: 12px;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.85rem;
        }

        .monitor-title {
            color: #0c544b;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .log-line {
            margin: 3px 0;
            line-height: 1.4;
        }

        .log-success { color: #27ae60; }
        .log-error { color: #c0392b; }
        .log-info { color: #2980b9; }
    </style>
</head>
<body>

<div class="container">

    <div class="tabs-container">
        <div class="tab" onclick="location.href='charts.html'">📊 Графіки</div>
        <div class="tab active">🧑‍🔧 Майстер</div>
        <div class="settings-btn">⚙️</div>
    </div>

    <div class="card">
        <h2 class="card-title">🧑‍🔧 Кабінет: <span id="pd-title">ПД-13</span></h2>
        <div class="card-subtitle">Оберіть діляннку, дату та відмітьте потрібні кілометри.</div>

        <div class="form-group">
            <label for="peregon">Перегін:</label>
            <select id="peregon" class="form-control">
                <option value="" disabled selected>Завантаження даних...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="track_type">Колія:</label>
            <select id="track_type" class="form-control" disabled>
                <option value="" disabled selected>Спочатку оберіть перегін</option>
            </select>
        </div>

        <div class="form-group">
            <label for="work_date">Дата виконання робіт:</label>
            <input type="date" id="work_date" class="form-control">
        </div>

        <div class="form-group">
            <label>Вибір кілометрів:</label>
            <div class="km-dropdown">
                <div class="km-header" id="kmHeaderBtn">
                    <span>📂 Показати список кілометрів (<span id="selectedCount">обрано: 0</span>)</span>
                    <span>🔽</span>
                </div>
                <div class="km-list" id="kmListContainer">
                    </div>
            </div>
        </div>

        <button class="btn-submit" id="submitBtn">Внести дані (відкрити діаграму)</button>
    </div>

    <div class="monitor">
        <div class="monitor-title">💻 Монітор самоаудиту системи</div>
        <div id="monitorLogs">
            </div>
    </div>

</div>

<script>
    // --- НАЛАШТУВАННЯ SUPABASE ---
    const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co"; // Ваш URL з скріншоту
    const SUPABASE_ANON_KEY = "ВАШ_SUPABASE_ANON_KEY";             // Вставте сюди свій ключ безпеки
    
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Поточний околоток (динамічний або фіксований)
    const CURRENT_PD = "ПД-13";
    document.getElementById('pd-title').innerText = CURRENT_PD;

    // Глобальний масив ліній (захищений від помилок)
    let globalTracks = [];

    // Елементи DOM
    const peregonSelect = document.getElementById('peregon');
    const trackSelect = document.getElementById('track_type');
    const workDateInput = document.getElementById('work_date');
    const kmHeaderBtn = document.getElementById('kmHeaderBtn');
    const kmListContainer = document.getElementById('kmListContainer');
    const selectedCountSpan = document.getElementById('selectedCount');
    const logsContainer = document.getElementById('monitorLogs');
    const submitBtn = document.getElementById('submitBtn');

    // Встановлення поточної дати за замовчуванням
    const today = new Date().toISOString().split('T')[0];
    workDateInput.value = today;

    // --- ФУНКЦІЯ ЛОГУВАННЯ (МОНІТОР) ---
    function logMessage(text, type = 'info') {
        const time = new Date().toLocaleTimeString();
        let className = 'log-info';
        if (type === 'success') className = 'log-success';
        if (type === 'error') className = 'log-error';

        const line = document.createElement('div');
        line.className = `log-line ${className}`;
        line.innerText = `[${time}]: ${text}`;
        logsContainer.appendChild(line);
        
        // Автоскрол монітора донизу
        logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    // --- ЗАВАНТАЖЕННЯ ДАНИХ З БАЗИ ---
    async function initCabinet() {
        logMessage(`Синхронізація хмари для ${CURRENT_PD}...`, 'info');
        
        try {
            // Завантажуємо конфігурацію з таблиці lines_config під наш ПД
            const { data, error } = await supabase
                .from('lines_config')
                .select('*')
                .eq('pd', CURRENT_PD);

            if (error) throw error;

            // БЕЗПЕЧНИЙ ЗАПИС: гарантуємо, що це завжди масив
            globalTracks = data || [];

            if (globalTracks.length === 0) {
                logMessage(`Попередження: Для ${CURRENT_PD} не знайдено ділянок в lines_config`, 'error');
                peregonSelect.innerHTML = '<option value="" disabled>Немає доступних ділянок</option>';
                return;
            }

            logMessage("Вхід виконано успішно", 'success');
            populatePeregons();

        } catch (err) {
            logMessage(`Помилка зв'язку: Supabase Mowing: ${err.message}`, 'error');
            peregonSelect.innerHTML = '<option value="" disabled>Помилка завантаження</option>';
        }
    }

    // --- ЗАПОВНЕННЯ СЕЛЕКТУ ПЕРЕГОНІВ ---
    function populatePeregons() {
        // Отримуємо виключно унікальні назви з колонки 'name'
        const uniqueNames = [...new Set(globalTracks.map(t => t.name))];
        
        peregonSelect.innerHTML = '<option value="" disabled selected>Оберіть ділянку...</option>';
        uniqueNames.forEach(name => {
            peregonSelect.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    // --- ОБРОБКА ВИБОРУ ПЕРЕГОНУ ---
    peregonSelect.addEventListener('change', (e) => {
        const selectedName = e.target.value;
        
        // Фільтруємо колії, які належать цьому перегону
        const availableTracks = globalTracks.filter(t => t.name === selectedName);

        trackSelect.innerHTML = '<option value="" disabled selected>Оберіть колію...</option>';
        availableTracks.forEach(track => {
            trackSelect.innerHTML += `<option value="${track.track_type}">${track.track_type}</option>`;
        });

        trackSelect.disabled = false;
        // Скидаємо вибір кілометрів при зміні перегону
        resetKmSelection();
    });

    // --- ОБРОБКА ВИБОРУ КОЛІЇ ТА ГЕНЕРАЦІЯ КІЛОМЕТРІВ ---
    trackSelect.addEventListener('change', () => {
        const selectedName = peregonSelect.value;
        const selectedTrackType = trackSelect.value;

        // Шукаємо конкретний рядок конфігурації
        const currentLineConfig = globalTracks.find(t => t.name === selectedName && t.track_type === selectedTrackType);

        if (currentLineConfig) {
            // Використовуємо значення кілометрів з бази даних.
            // Якщо у вашій таблиці є старт/кінець, беремо їх (наприклад, від start_km до start_km + 15)
            const startKm = currentLineConfig.start_km || 1;
            const endKm = currentLineConfig.end_km || (startKm + 10); // якщо end_km немає, генеруємо 10 км
            
            generateKmCheckboxes(startKm, endKm);
            logMessage(`Завантажено кілометри для ділянки ${selectedName} (${selectedTrackType} колія)`, 'info');
        }
    });

    // --- ГЕНЕРАЦІЯ ЧЕКБОКСІВ КІЛОМЕТРІВ ---
    function generateKmCheckboxes(start, end) {
        kmListContainer.innerHTML = '';
        for (let i = start; i <= end; i++) {
            const item = document.createElement('label');
            item.className = 'km-item';
            item.innerHTML = `<input type="checkbox" class="km-checkbox" value="${i}"> км ${i}`;
            kmListContainer.appendChild(item);
        }

        // Вішаємо подію оновлення лічильника на кожен чекбокс
        document.querySelectorAll('.km-checkbox').forEach(cb => {
            cb.addEventListener('change', updateSelectedKmCount);
        });
    }

    function updateSelectedKmCount() {
        const checkedCount = document.querySelectorAll('.km-checkbox:checked').length;
        selectedCountSpan.innerText = `обрано: ${checkedCount}`;
    }

    function resetKmSelection() {
        kmListContainer.innerHTML = '';
        selectedCountSpan.innerText = 'обрано: 0';
    }

    // --- ВІДКРИТТЯ/ЗАКРИТТЯ СПИСКУ КІЛОМЕТРІВ ---
    kmHeaderBtn.addEventListener('click', () => {
        const isVisible = kmListContainer.style.display === 'grid';
        kmListContainer.style.display = isVisible ? 'none' : 'grid';
    });

    // --- ЗБЕРЕЖЕННЯ ДАНИХ (ВНЕСЕННЯ В БАЗУ) ---
    submitBtn.addEventListener('click', async () => {
        const peregon = peregonSelect.value;
        const trackType = trackSelect.value;
        const date = workDateInput.value;
        const selectedKms = Array.from(document.querySelectorAll('.km-checkbox:checked')).map(cb => parseInt(cb.value));

        // Валідація
        if (!peregon || !trackType) {
            logMessage("Помилка внесення: не обрано перегін або колію!", "error");
            alert("Будь ласка, оберіть перегін та колію!");
            return;
        }
        if (selectedKms.length === 0) {
            logMessage("Помилка внесення: не обрано жодного кілометра!", "error");
            alert("Оберіть хоча б один кілометр!");
            return;
        }

        logMessage(`Запуск збереження даних для ${peregon}...`, 'info');
        
        // Готуємо масив рядків для вставки.
        // За замовчуванням автоматично закриваємо всі 10 пікетів на вказаних кілометрах
        const rowsToInsert = [];
        selectedKms.forEach(km => {
            for (let piket = 1; piket <= 10; piket++) {
                rowsToInsert.push({
                    pd: CURRENT_PD,
                    peregon: peregon,
                    track_type: trackType,
                    km: km,
                    piket: piket,
                    status: 'green', // Статус виконаного косіння
                    date: date
                });
            }
        });

        try {
            // Використовуємо .upsert() разом із унікальним первинним ключем бази для перезапису дублікатів
            const { error } = await supabase
                .from('mowing')
                .upsert(rowsToInsert, { onConflict: 'peregon,track_type,km,piket' });

            if (error) throw error;

            logMessage(`Успішно внесено/оновлено ${selectedKms.length} км (${rowsToInsert.length} пікетів).`, 'success');
            alert("Дані успішно збережено в системі!");
            
            // За бажанням тут можна перенаправити на сторінку графіків:
            // location.href = 'charts.html';

        } catch (err) {
            logMessage(`Помилка запису в Supabase: ${err.message}`, 'error');
            alert("Не вдалося зберегти дані в хмару. Перевірте монітор помилок.");
        }
    });

    // Запуск системи при завантаженні сторінки
    window.onload = initCabinet;
</script>

</body>
</html>
