<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабінет Шляхового Майстра</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #008b74;
            --primary-hover: #006f5d;
            --bg: #f0fdf4;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            
            --color-red: #ef4444;    /* > 45 днів */
            --color-yellow: #eab308; /* 30-45 днів */
            --color-green: #22c55e;  /* < 30 днів */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 650px; }
        .nav-btn { flex: 1; background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: var(--card); border-radius: 16px; padding: 25px; width: 100%; max-width: 650px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .card-title { font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .card-subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; background: #fff; }
        .form-control:focus { border-color: var(--primary); }
        
        /* Стиль для папки з кілометрами */
        .folder-container { border: 1px solid var(--border); border-radius: 10px; background: #fff; overflow: hidden; }
        .folder-header { padding: 12px 15px; background: #f8fafc; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border); }
        .folder-content { padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; }
        
        .km-checkbox { display: flex; align-items: center; gap: 6px; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; border: 1px solid transparent; transition: all 0.2s; }
        .km-checkbox input { cursor: pointer; }
        .km-checkbox.checked { background: #e0f2fe; border-color: #38bdf8; color: #0369a1; }

        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: var(--primary-hover); }

        /* Діаграма татання пікетів */
        .diagram-container { margin-top: 25px; border-top: 2px dashed var(--border); padding-top: 25px; }
        .diagram-row { margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .diagram-title { font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #334155; }
        .km-block { display: flex; flex-direction: column; margin-bottom: 5px; }
        .km-label { font-size: 11px; font-weight: bold; margin-bottom: 5px; text-align: center; background: #cbd5e1; padding: 2px; border-radius: 4px; width: 60px; }
        .pikets-grid { display: flex; width: 100%; gap: 4px; }
        
        .piket { flex: 1; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: white; cursor: pointer; border-radius: 6px; transition: all 0.1s ease; border: 1px solid rgba(0,0,0,0.08); user-select: none; }
        .piket:active { transform: scale(0.92); }
        
        .status-red { background: var(--color-red); }
        .status-yellow { background: var(--color-yellow); color: #1e293b; }
        .status-green { background: var(--color-green); }
        
        /* Стиль активованого зараз пікету */
        .status-active { 
            background: var(--color-green) !important; 
            border: 2px solid #15803d !important; 
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); 
            color: white !important; 
        }

        .legend { display: flex; gap: 15px; font-size: 12px; font-weight: bold; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }
        .legend-active-box { border: 2px solid #15803d; box-shadow: 0 0 4px rgba(34, 197, 94, 0.4); }

        /* Термінал самоаудиту */
        .monitor { width: 100%; max-width: 650px; background: #1e293b; color: #34d399; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .monitor-title { color: #cbd5e1; margin-bottom: 8px; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .monitor-logs { max-height: 140px; overflow-y: auto; line-height: 1.5; }
        .log-err { color: #f87171; }
        .log-success { color: #4ade80; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-container">
        <button class="nav-btn">📊 Графіки</button>
        <button class="nav-btn active">🧑‍🔧 Майстер</button>
    </div>

    <div id="login-card" class="card">
        <div class="card-title">🧑‍🔧 Вхід для ПД</div>
        <div class="card-subtitle">Внесіть дані про виконане обкошування на вашому околотку.</div>
        
        <div class="form-group">
            <label>Пароль доступу (номер ПД дублем):</label>
            <input type="password" id="password-input" class="form-control" placeholder="Наприклад: 1313" maxlength="4">
        </div>
        <button type="button" class="btn-submit" onclick="executeLogin()">Увійти в кабінет</button>
    </div>

    <div id="cabinet-card" class="card hidden">
        <div class="card-title">🧑‍🔧 Кабінет: <span id="pd-title-name">ПД-..</span></div>
        <div class="card-subtitle">Оберіть ділянку, дату та відмітьте потрібні кілометри.</div>
        
        <div class="form-group">
            <label>Перегін / Станція:</label>
            <select id="peregon-select" class="form-control" onchange="handlePeregonChange()">
                <option value="">Оберіть перегін...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Колія:</label>
            <select id="track-select" class="form-control">
                <option value="">Спочатку оберіть перегін</option>
            </select>
        </div>

        <div class="form-group">
            <label>Дата виконання робіт:</label>
            <input type="date" id="date-input" class="form-control">
        </div>

        <div class="form-group">
            <label>Вибір кілометрів:</label>
            <div class="folder-container">
                <div class="folder-header" onclick="toggleFolder()">
                    <span>📁 Показати список кілометрів</span>
                    <span id="km-counter">обрано: 0</span>
                </div>
                <div id="km-content" class="folder-content">
                    </div>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="buildDiagram()">Внести дані (відкрити діаграму)</button>

        <div id="diagram-section" class="diagram-container hidden">
            <div class="legend">
                <div class="legend-item"><div class="legend-color status-green"></div> Свіже (до 30 дн.)</div>
                <div class="legend-item"><div class="legend-color status-yellow"></div> Увага (30-45 дн.)</div>
                <div class="legend-item"><div class="legend-color status-red"></div> Протерміновано (>45 дн.)</div>
                <div class="legend-item"><div class="legend-color status-green legend-active-box"></div> ✓ Відмічено зараз</div>
            </div>
            
            <div id="diagram-content"></div>
            
            <button type="button" class="btn-submit" style="margin-top: 15px;" onclick="saveData()">Синхронізувати з хмарою</button>
        </div>
    </div>

    <div class="monitor">
        <div class="monitor-title">💻 Монітор самоаудиту системи:</div>
        <div id="monitor-logs" class="monitor-logs"></div>
    </div>

    <script>
        // Конфігурація підключення до Supabase
        const SUPABASE_URL = "https://zcyntywoftcahfjwqldr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        
        let supabase = null;
        let currentPD = "";
        let linesConfigList = [];
        let selectedDataToSave = []; 

        function log(msg, type = 'info') {
            const el = document.getElementById('monitor-logs');
            if (!el) return;
            let classColor = '';
            if (type === 'error') classColor = 'class="log-err"';
            if (type === 'success') classColor = 'class="log-success"';
            
            el.innerHTML += `<div ${classColor}>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        // Безпечний запуск після завантаження сторінки browser-side
        window.addEventListener('DOMContentLoaded', () => {
            try {
                document.getElementById('date-input').valueAsDate = new Date();

                if (typeof window.supabase === 'undefined') {
                    log("🚨 КРИТИЧНА ПОМИЛКА: Не завантажено інструмент Supabase CDN!", "error");
                    return;
                }

                // Виправлено: чистий виклик без символу @
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log("Система готова до авторизації майстра.");
            } catch (err) {
                log(`🚨 Збій ініціалізації: ${err.message}`, "error");
            }
        });

        async function executeLogin() {
            const passInput = document.getElementById('password-input');
            const pass = passInput ? passInput.value.trim() : "";
            
            if (!/^\d{4}$/.test(pass) || pass.slice(0, 2) !== pass.slice(2, 4)) {
                alert("Невірний формат! Введіть 4 цифри паролю (номер вашого ПД два рази, наприклад 1313).");
                return;
            }

            currentPD = `ПД-${pass.slice(0, 2)}`;
            log(`Синхронізація хмари для ${currentPD}...`);

            try {
                // Завантажуємо ділянки конкретного околотку
                const { data, error } = await supabase
                    .from('lines_config')
                    .select('*')
                    .eq('pd', currentPD);

                if (error) throw error;

                if (!data || data.length === 0) {
                    log(`⚠️ Для ${currentPD} не знайдено конфігурації ділянок в lines_config.`, "error");
                    alert(`Помилка: Налаштування для ${currentPD} відсутні в базі.`);
                    return;
                }

                linesConfigList = data;
                log(`Знайдено ділянок: ${data.length}. Будуємо меню...`, "success");
                
                // Заповнюємо випадаючий список перегонів
                const peregonSelect = document.getElementById('peregon-select');
                peregonSelect.innerHTML = '<option value="">Оберіть перегін...</option>';
                
                const uniqueNames = [...new Set(data.map(item => item.name))];
                uniqueNames.forEach(name => {
                    peregonSelect.innerHTML += `<option value="${name}">${name}</option>`;
                });

                document.getElementById('pd-title-name').innerText = currentPD;
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('cabinet-card').classList.remove('hidden');
                log("Вхід виконано успішно", "success");

            } catch (err) {
                log(`🚨 Помилка авторизації: ${err.message}`, "error");
                alert("Не вдалося підключитися до бази даних.");
            }
        }

        function handlePeregonChange() {
            const selectedPeregon = document.getElementById('peregon-select').value;
            const trackSelect = document.getElementById('track-select');
            const kmContent = document.getElementById('km-content');
            
            trackSelect.innerHTML = '<option value="">Оберіть колію...</option>';
            kmContent.innerHTML = '';
            updateKmCounter();

            if (!selectedPeregon) return;

            log(`Обрано перегін: ${selectedPeregon}`);

            // Фільтруємо колії для цього перегону
            const filtered = linesConfigList.filter(item => item.name === selectedPeregon);
            
            // Заповнюємо колії
            const uniqueTracks = [...new Set(filtered.map(item => item.track_type))];
            uniqueTracks.forEach(track => {
                trackSelect.innerHTML += `<option value="${track}">${track}</option>`;
            });
            if(uniqueTracks.length === 1) trackSelect.selectedIndex = 1;

            // Визначаємо діапазон кілометрів (мінімальний та максимальний серед усіх записів перегону)
            const startKms = filtered.map(item => item.start_km).filter(k => k !== null);
            const endKms = filtered.map(item => item.end_km).filter(k => k !== null);
            
            if(startKms.length > 0 && endKms.length > 0) {
                const minKm = Math.min(...startKms);
                const maxKm = Math.max(...endKms);
                
                log(`Завантажено кілометри: з ${minKm} по ${maxKm}`);

                // Будуємо чекбокси для кожного КМ
                for (let k = minKm; k <= maxKm; k++) {
                    kmContent.innerHTML += `
                        <label class="km-checkbox" id="label-km-${k}">
                            <input type="checkbox" value="${k}" onchange="handleKmCheck(this, ${k})"> КМ ${k}
                        </label>
                    `;
                }
            }
        }

        function handleKmCheck(checkbox, km) {
            const label = document.getElementById(`label-km-${checkbox.value}`);
            if (checkbox.checked) {
                label.classList.add('checked');
            } else {
                label.classList.remove('checked');
            }
            updateKmCounter();
        }

        function updateKmCounter() {
            const checkedCount = document.querySelectorAll('#km-content input:checked').length;
            document.getElementById('km-counter').innerText = `обрано: ${checkedCount}`;
        }

        function toggleFolder() {
            const content = document.getElementById('km-content');
            content.style.display = (content.style.display === 'none' || content.style.display === '') ? 'flex' : 'none';
        }

        async function buildDiagram() {
            selectedDataToSave = [];
            const peregon = document.getElementById('peregon-select').value;
            const track = document.getElementById('track-select').value;
            const checkedKms = Array.from(document.querySelectorAll('#km-content input:checked')).map(cb => parseInt(cb.value));

            if (!peregon || !track || checkedKms.length === 0) {
                alert("Помилка: Оберіть перегін, колію та хоча б один кілометр із списку!");
                return;
            }

            log(`Запит журналів стану для КМ: ${checkedKms.join(', ')}...`);

            try {
                // Завантажуємо історію обкошування з бази даних
                const { data: pastData, error } = await supabase
                    .from('mowing')
                    .select('*')
                    .eq('pd', currentPD)
                    .eq('peregon', peregon)
                    .eq('track_type', track)
                    .in('km', checkedKms);

                if (error) throw error;

                const diagramContent = document.getElementById('diagram-content');
                diagramContent.innerHTML = "";
                const today = new Date();

                const row = document.createElement('div');
                row.className = 'diagram-row';
                row.innerHTML = `<div class="diagram-title">🛤️ Ділянка: ${peregon} | Колія: ${track}</div>`;

                checkedKms.forEach(km => {
                    const kmBlock = document.createElement('div');
                    kmBlock.className = 'km-block';
                    kmBlock.innerHTML = `<div class="km-label">КМ ${km}</div>`;
                    
                    const piketsGrid = document.createElement('div');
                    piketsGrid.className = 'pikets-grid';

                    for (let p = 1; p <= 10; p++) {
                        // Фільтруємо записи для поточного пікету
                        const history = (pastData || [])
                            .filter(d => d.km === km && d.piket === p)
                            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                        let statusClass = 'status-red'; 
                        
                        if (history && history.created_at) {
                            const diffDays = Math.floor((today - new Date(history.created_at)) / (1000 * 60 * 60 * 24));
                            if (diffDays <= 30) statusClass = 'status-green';
                            else if (diffDays <= 45) statusClass = 'status-yellow';
                            else statusClass = 'status-red';
                        }

                        const pBox = document.createElement('div');
                        pBox.className = `piket ${statusClass}`;
                        pBox.innerText = p;
                        pBox.dataset.peregon = peregon;
                        pBox.dataset.track = track;
                        pBox.dataset.km = km;
                        pBox.dataset.piket = p;
                        
                        pBox.onclick = () => togglePiket(pBox);
                        piketsGrid.appendChild(pBox);
                    }
                    
                    kmBlock.appendChild(piketsGrid);
                    row.appendChild(kmBlock);
                });

                diagramContent.appendChild(row);
                document.getElementById('diagram-section').classList.remove('hidden');
                log("Лінійну діаграму сформовано. Відмітьте виконані пікети тапанням.", "success");

            } catch (err) {
                log(`🚨 Помилка побудови сітки: ${err.message}`, "error");
            }
        }

        function togglePiket(element) {
            const isSelected = element.classList.contains('status-active');
            
            const pData = {
                pd: currentPD,
                peregon: element.dataset.peregon,
                track_type: element.dataset.track,
                km: parseInt(element.dataset.km),
                piket: parseInt(element.dataset.piket),
                status: 'обкошено',
                created_at: new Date(document.getElementById('date-input').value).toISOString()
            };

            if (isSelected) {
                element.classList.remove('status-active');
                element.innerText = element.dataset.piket;
                selectedDataToSave = selectedDataToSave.filter(d => 
                    !(d.km === pData.km && d.piket === pData.piket)
                );
            } else {
                element.classList.add('status-active');
                element.innerText = "✓";
                selectedDataToSave.push(pData);
            }
            
            log(`Обрано пікетів для фіксації: ${selectedDataToSave.length}`);
        }

        async function saveData() {
            if (selectedDataToSave.length === 0) {
                alert("Ви не вибрали жодного пікету для збереження!");
                return;
            }

            try {
                log(`Надсилання даних в хмару (записів: ${selectedDataToSave.length})...`);
                
                // Використовуємо простий безпечний .insert()
                const { error } = await supabase
                    .from('mowing')
                    .insert(selectedDataToSave);

                if (error) throw error;

                log("✅ Усі відмітки успішно зафіксовано в системі!", "success");
                alert("Успіх! Дані збережено в журнал обкошування.");
                
                // Оновлюємо діаграму, щоб зафіксувати сталі зелені кольори
                buildDiagram(); 
            } catch (err) {
                log(`🚨 НЕ ВДАЛОСЯ ВИКОНАТИ ЗБЕРЕЖЕННЯ: ${err.message}`, "error");
                alert(`Помилка бази даних: ${err.message}\n\nПЕРЕВІРТЕ: Чи вимкнули ви політику RLS для таблиці 'mowing' у кабінеті Supabase?`);
            }
        }
    </script>
</body>
</html>
