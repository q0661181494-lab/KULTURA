<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест підключення до Supabase</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; padding: 20px; color: #1f2937; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2563eb; margin-top: 0; }
        .status { padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; }
        .loading { background-color: #fef3c7; color: #d97706; }
        .success { background-color: #dcfce7; color: #15803d; }
        .error { background-color: #fee2e2; color: #b91c1c; }
        pre { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>📡 Діагностика підключення Supabase</h2>
        
        <div id="status-indicator" class="status loading">З'єднання з хмарою...</div>
        
        <h3>Вміст таблиці 'tracks':</h3>
        <pre id="output-tracks">Очікування відповіді...</pre>

        <h3>Вміст таблиці 'mowing':</h3>
        <pre id="output-mowing">Очікування відповіді...</pre>
    </div>

    <script>
        // Конфігурація вашого проєкту
        const fullKey = "sb_publishable_0-purk_0ckyXmGdYaWyA_g_JRl_O-mh";
        const baseDbUrl = "https://zcyntywoftcahfjwqldr.supabase.co";

        // Заголовки запиту
        const headers = {
            'apikey': fullKey,
            'authorization': 'Bearer ' + fullKey,
            'Content-Type': 'application/json'
        };

        window.onload = async function() {
            const statusDiv = document.getElementById('status-indicator');
            const tracksPre = document.getElementById('output-tracks');
            const mowingPre = document.getElementById('output-mowing');

            try {
                // 1. Пробуємо прочитати таблицю tracks
                const resTracks = await fetch(`${baseDbUrl}/rest/v1/tracks?select=*`, { headers: headers });
                
                if (!resTracks.ok) {
                    const errText = await resTracks.text();
                    throw new Error(`Помилка таблиці tracks (${resTracks.status}): ${errText}`);
                }
                const tracksData = await resTracks.json();
                tracksPre.innerText = JSON.stringify(tracksData, null, 2);

                // 2. Пробуємо прочитати таблицю mowing
                const resMowing = await fetch(`${baseDbUrl}/rest/v1/mowing?select=*`, { headers: headers });
                
                if (!resMowing.ok) {
                    const errText = await resMowing.text();
                    throw new Error(`Помилка таблиці mowing (${resMowing.status}): ${errText}`);
                }
                const mowingData = await resMowing.json();
                mowingPre.innerText = JSON.stringify(mowingData, null, 2);

                // Якщо все успішно
                statusDiv.className = "status success";
                statusDiv.innerText = "✅ Дані успішно отримано з Supabase!";

            } catch (error) {
                // Якщо десь виник збій
                statusDiv.className = "status error";
                statusDiv.innerText = "❌ Помилка з'єднання!";
                tracksPre.innerText = `Критична помилка виконання:\n${error.message}`;
                mowingPre.innerText = "Запит перервано через помилку вище.";
            }
        };
    </script>
</body>
</html>
